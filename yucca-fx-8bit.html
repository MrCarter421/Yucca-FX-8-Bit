<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0817">
<meta name="description" content="YUCCA-FX 8-BIT — Browser-based NES-style sound effect synthesizer. Make chiptune SFX with draggable ADSR, pulse/triangle/noise oscillators, and export to MP3 or WAV.">
<meta property="og:title" content="YUCCA-FX 8-BIT">
<meta property="og:description" content="Browser-based NES-style sound effect synthesizer.">
<meta property="og:type" content="website">
<title>YUCCA-FX 8-BIT — Chiptune SFX Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0817'/><rect x='4' y='10' width='4' height='12' fill='%23ffec27'/><rect x='12' y='6' width='4' height='20' fill='%233ad7ff'/><rect x='20' y='14' width='4' height='4' fill='%23ff3b4e'/><rect x='20' y='8' width='4' height='4' fill='%233df56b'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0:#0a0817; --bg1:#13112b; --bg2:#1d1b3a; --bg3:#272455;
    --ink:#06040f; --border:#3b3470; --mute:#5a5290; --text:#e0d8ff; --dim:#9089c8;
    --yellow:#ffec27; --red:#ff3b4e; --green:#3df56b; --cyan:#3ad7ff;
    --magenta:#ff5dc1; --orange:#ff8a3d; --purple:#a35dff;
    --pixel: 'Press Start 2P', monospace;
    --term: 'VT323', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg0); color: var(--text); font-family: var(--term); font-size: 16px;
    min-height: 100vh; overscroll-behavior: none; -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%; line-height: 1.2;
  }
  button { font-family: inherit; cursor: pointer; user-select: none; -webkit-user-select: none; background: none; color: inherit; }
  button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
  input { font-family: var(--term); -webkit-appearance: none; appearance: none; }

  /* CRT scanline + vignette overlays */
  body::before {
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
  }
  body::after {
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 99;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
  }

  .app { max-width: 1200px; margin: 0 auto; padding: 12px; position: relative; z-index: 1; }
  @media (min-width: 640px) { .app { padding: 16px; } }

  /* STICKY TOP BAR — header + status + scope all glued to top of viewport */
  .top-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--ink);
    /* extend the bg behind the .app's padding so nothing peeks through when scrolling */
    margin-left: -12px; margin-right: -12px; padding: 12px 12px 8px;
  }
  @media (min-width: 640px) {
    .top-bar { margin-left: -16px; margin-right: -16px; padding: 16px 16px 8px; }
  }
  .scope-bar {
    background: var(--bg1); border: 2px solid var(--border); box-shadow: 4px 4px 0 0 var(--ink);
    padding: 8px 10px; margin-top: 0;
  }
  .scope-bar .sub-label { margin-bottom: 4px; }
  .top-bar .header,
  .top-bar .status { margin-bottom: 8px; }

  /* HEADER */
  .header {
    background: var(--bg1); border: 2px solid var(--border); box-shadow: 4px 4px 0 0 var(--ink);
    padding: 12px 14px; margin-bottom: 14px; display: flex; flex-wrap: wrap;
    align-items: center; justify-content: space-between; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .brand-leds { display: flex; gap: 6px; }
  .led { width: 14px; height: 14px; box-shadow: 2px 2px 0 var(--ink); }
  .brand-text { line-height: 1.4; }
  .brand-title { font-family: var(--pixel); font-size: 14px; color: var(--yellow); letter-spacing: 0.05em; }
  .brand-title em { font-style: normal; color: var(--cyan); }
  .brand-sub { color: var(--dim); font-size: 13px; margin-top: 4px; letter-spacing: 0.05em; }
  .brand-sub b { color: var(--green); animation: blink 1s steps(1) infinite; }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* STATUS BAR */
  .status {
    background: var(--ink); border: 2px solid var(--border); padding: 8px 12px;
    margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; gap: 10px;
  }
  .status-msg { color: var(--green); }
  .status-version { color: var(--dim); flex-shrink: 0; }

  /* MAIN GRID */
  .main-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 720px) { .main-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .main-grid { grid-template-columns: 1fr 1fr 1fr; } }

  .col { display: flex; flex-direction: column; gap: 12px; }

  /* SECTION */
  .section {
    background: var(--bg1); border: 2px solid var(--border); box-shadow: 4px 4px 0 0 var(--ink);
    padding: 12px; display: flex; flex-direction: column; gap: 10px;
  }
  .section-head { display: flex; align-items: center; gap: 8px; }
  .section-dot { width: 6px; height: 6px; }
  .section-title {
    font-family: var(--pixel); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .section-head-clickable { cursor: pointer; user-select: none; }
  .section-head-clickable:hover .section-title { filter: brightness(1.4); }
  .section-content { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 0; }
  .section-chevron {
    font-family: var(--pixel); font-size: 16px; margin-left: auto;
    line-height: 1; opacity: 0.85;
    min-width: 32px; min-height: 32px; padding: 4px 8px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 2px solid var(--border); background: var(--bg2);
    box-shadow: 2px 2px 0 var(--ink);
    transition: opacity 0.1s, transform 0.05s;
  }
  .section-head-clickable:hover .section-chevron { opacity: 1; }
  .section-head-clickable:active .section-chevron { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
  .section-toggle {
    font-family: var(--pixel); font-size: 9px; letter-spacing: 0.05em;
    padding: 4px 9px; min-height: 28px; cursor: pointer;
    border: 2px solid var(--border); background: var(--bg2); color: var(--dim);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .section-toggle.on { background: var(--green); color: var(--ink); border-color: var(--ink); }
  .section-toggle:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
  .section.collapsed { padding-bottom: 12px; }

  /* ===== TOP MENU DROPDOWNS ===== */
  .menu-wrap { position: relative; display: inline-flex; }
  .menu-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 11px; font-family: var(--pixel); font-size: 9px; letter-spacing: 0.05em;
    background: var(--bg2); color: var(--text); border: 2px solid var(--border);
    box-shadow: 3px 3px 0 var(--ink); cursor: pointer; min-height: 32px;
  }
  .menu-btn:hover { filter: brightness(1.15); }
  .menu-btn.open { background: var(--ink); transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  .menu-btn .menu-chevron { font-size: 10px; opacity: 0.7; }
  .menu-popup {
    position: fixed;
    /* top/left set dynamically by makeDropdown so we never overflow viewport */
    min-width: 320px; max-width: 92vw;
    max-height: 70vh; overflow-y: auto;
    background: var(--bg1); border: 3px solid var(--border);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 12px; z-index: 100;
    display: flex; flex-direction: column; gap: 12px;
  }
  .menu-popup.hidden { display: none; }

  /* ===== MODAL CONFIRM ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(6, 4, 15, 0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal {
    background: var(--bg1); border: 3px solid var(--border);
    box-shadow: 8px 8px 0 var(--ink); padding: 20px;
    max-width: 420px; width: 100%;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal-title {
    font-family: var(--pixel); font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .modal-message {
    font-family: var(--term); font-size: 14px; color: var(--text); line-height: 1.5;
  }
  .modal-buttons {
    display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  }
  .modal-dsa {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--pixel); font-size: 9px; letter-spacing: 0.05em;
    color: var(--dim); cursor: pointer; user-select: none;
    padding: 6px 0;
  }
  .modal-dsa input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px;
    border: 2px solid var(--border); background: var(--bg2);
    box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer; margin: 0; position: relative;
  }
  .modal-dsa input[type="checkbox"]:checked {
    background: var(--green);
  }
  .modal-dsa input[type="checkbox"]:checked::after {
    content: '✓'; position: absolute; top: -3px; left: 1px;
    color: var(--ink); font-family: var(--pixel); font-size: 14px; font-weight: bold;
  }
  .modal-dsa:hover { color: var(--text); }

  /* ===== FILTER VISUALIZER ===== */
  .filter-viz {
    width: 100%; height: 100px; display: block;
    background: var(--ink); border: 2px solid var(--border);
  }
  .sub-label {
    font-family: var(--term); font-size: 12px; color: var(--dim);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px;
  }

  /* SLIDER (custom, pointer-events based) */
  .slider { display: flex; flex-direction: column; gap: 4px; }
  .slider-header { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-label { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .slider-value { font-size: 14px; font-variant-numeric: tabular-nums; }
  .slider-track {
    position: relative; height: 18px; background: var(--ink); border: 2px solid var(--border);
    cursor: ew-resize; touch-action: none; user-select: none;
  }
  .slider-fill {
    height: 100%; position: absolute; left: 0; top: 0; pointer-events: none;
    box-shadow: inset 0 -2px 0 0 rgba(0,0,0,0.3); width: 0;
  }
  .slider-thumb {
    position: absolute; top: -3px; width: 8px; height: calc(100% + 6px);
    transform: translateX(-50%); pointer-events: none;
    border: 2px solid var(--ink); box-shadow: 2px 0 0 rgba(0,0,0,0.45);
  }

  /* TOGGLE GROUP */
  .toggle-group { display: flex; gap: 4px; }
  .toggle-btn {
    flex: 1; padding: 9px 4px; font-family: var(--term); font-size: 13px;
    background: var(--bg2); color: var(--dim); border: 2px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.05em; min-height: 38px;
    transition: none; line-height: 1;
  }
  .toggle-btn.active {
    color: var(--ink); font-weight: 700;
    box-shadow: inset 0 -2px 0 0 rgba(0,0,0,0.25);
  }

  /* PIXEL BUTTON */
  .pixel-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: var(--pixel); font-size: 10px; padding: 12px 14px;
    color: var(--ink); border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 0 var(--ink); letter-spacing: 0.08em; text-transform: uppercase;
    min-height: 44px; transition: none; white-space: nowrap;
  }
  .pixel-btn.small { font-size: 9px; padding: 9px 11px; min-height: 38px; }
  .pixel-btn.full { width: 100%; }
  .pixel-btn:active {
    transform: translate(3px, 3px); box-shadow: 1px 1px 0 0 var(--ink);
  }
  .pixel-btn[disabled] { opacity: 0.45; cursor: not-allowed; }
  .pixel-btn[disabled]:active { transform: none; box-shadow: 4px 4px 0 0 var(--ink); }
  .pixel-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* CANVAS displays */
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  .scope { background: var(--ink); border: 2px solid var(--border); }
  .scope canvas { width: 100%; height: 64px; }

  .adsr-display { position: relative; }
  .adsr-display canvas { width: 100%; height: 180px; touch-action: none; }
  .adsr-legend {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between;
    margin-top: 4px; padding: 0 4px; font-size: 12px;
  }

  /* PRESET BANK */
  .preset-form {
    display: flex; flex-direction: column; gap: 8px; align-items: stretch;
  }
  @media (min-width: 480px) { .preset-form { flex-direction: row; align-items: end; } }
  .preset-name-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .preset-input {
    background: var(--ink); color: var(--yellow); border: 2px solid var(--border);
    padding: 8px 10px; font-size: 16px; outline: none; min-height: 38px;
    text-transform: uppercase;
  }
  .preset-input:focus { border-color: var(--yellow); }

  .preset-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px;
  }
  @media (min-width: 480px) { .preset-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 720px) { .preset-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1080px) { .preset-grid { grid-template-columns: repeat(6, 1fr); } }

  .preset-card {
    display: flex; flex-direction: column;
    background: var(--bg2); border: 2px solid var(--border);
    box-shadow: 3px 3px 0 0 var(--ink);
  }
  .preset-load {
    padding: 10px; font-family: var(--pixel); font-size: 9px; color: var(--cyan);
    letter-spacing: 0.05em; text-align: left; min-height: 40px; display: flex; align-items: center;
  }
  .preset-load:active { background: var(--bg3); }
  .preset-del {
    padding: 4px; background: var(--bg3); color: var(--red); border-top: 2px solid var(--border);
    font-family: var(--term); font-size: 12px; min-height: 28px;
  }
  .preset-del:active { background: var(--red); color: var(--ink); }
  .preset-empty {
    text-align: center; padding: 14px; color: var(--mute); font-size: 14px;
  }

  .factory-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .factory-btn {
    font-family: var(--pixel); font-size: 9px; padding: 9px 11px;
    background: var(--bg2); color: var(--green); border: 2px solid var(--green);
    box-shadow: 3px 3px 0 0 var(--ink); letter-spacing: 0.05em; min-height: 38px;
    transition: none;
  }
  .factory-btn:active {
    transform: translate(2px, 2px); box-shadow: 1px 1px 0 0 var(--ink);
  }

  .export-row {
    display: flex; flex-direction: column; gap: 8px;
  }
  @media (min-width: 480px) { .export-row { flex-direction: row; } }

  .export-error {
    margin-top: 6px; padding: 6px 10px; color: var(--red); background: var(--ink);
    border: 2px solid var(--red); font-size: 13px;
  }
  .export-note {
    color: var(--mute); font-size: 12px; line-height: 1.4;
  }

  .footer {
    margin-top: 16px; text-align: center; color: var(--mute); font-size: 13px;
    letter-spacing: 0.1em; padding-bottom: 20px;
  }
  .footer a { color: var(--dim); text-decoration: none; border-bottom: 1px dashed var(--border); }
  .footer a:hover { color: var(--cyan); border-color: var(--cyan); }
  .footer-help { color: var(--mute); }
  .footer-credits {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed var(--border);
    display: flex; gap: 10px; align-items: center; justify-content: center;
    flex-wrap: wrap;
    font-family: var(--pixel); font-size: 9px; letter-spacing: 0.1em;
  }
  .footer-tag { color: var(--mute); }
  .footer-sep { color: var(--bg3); }
  .footer-brand {
    color: var(--yellow) !important;
    border-bottom: 1px dashed var(--yellow) !important;
  }
  .footer-brand:hover { color: var(--cyan) !important; border-color: var(--cyan) !important; }
  .footer-link {
    color: var(--green) !important;
    border-bottom: 1px dashed var(--green) !important;
    display: inline-flex; align-items: center;
  }
  .footer-link:hover { color: var(--cyan) !important; border-color: var(--cyan) !important; }

  /* Hide focus rings on touch */
  @media (hover: none) {
    button:focus { outline: none; }
  }

  /* ===== SEQUENCER / LISSAJOUS / MUTANT / BENT ===== */
  .seq-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 800px) { .seq-grid { grid-template-columns: 240px 1fr; } }
  .lissajous-wrap { display: flex; flex-direction: column; gap: 8px; }
  .lissajous-canvas { width: 100%; aspect-ratio: 1 / 1; background: var(--ink); border: 2px solid var(--border); display: block; }
  .seq-tracks { display: flex; flex-direction: column; gap: 10px; }
  .seq-transport {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .seq-bpm-wrap { flex: 1; min-width: 120px; }
  .seq-track {
    background: var(--bg2); border: 2px solid var(--border); padding: 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .seq-track-head {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .seq-track-toggle {
    width: 22px; height: 22px; border: 2px solid var(--border); cursor: pointer;
    flex-shrink: 0; padding: 0;
  }
  .seq-track-toggle.on { background: var(--green); }
  .seq-track-toggle.off { background: var(--bg3); }
  .seq-track-name {
    font-family: var(--pixel); font-size: 9px; letter-spacing: 0.05em;
    margin-right: auto;
  }
  .seq-track-controls {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
  }
  .seq-step-grid {
    display: flex; gap: 2px; flex-wrap: wrap;
    padding: 2px; background: var(--ink); border: 1px solid var(--border);
  }
  .seq-step {
    flex: 1; min-width: 12px; height: 14px; background: var(--bg3);
    transition: none;
  }
  .seq-step.on { background: var(--cyan); }
  .seq-step.head { box-shadow: inset 0 0 0 2px var(--yellow); }

  .destroy-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 600px) { .destroy-grid { grid-template-columns: 1fr 1fr; } }

  .mutant-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  @media (min-width: 720px) { .mutant-grid { grid-template-columns: 1fr 1fr 1fr 1fr; } }

  .var-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }

  .pill-toggle {
    display: inline-flex; padding: 6px 10px; font-family: var(--pixel); font-size: 9px;
    border: 2px solid var(--border); background: var(--bg2); color: var(--dim);
    letter-spacing: 0.05em; min-height: 32px; align-items: center;
    cursor: pointer;
  }
  .pill-toggle.on { background: var(--red); color: var(--ink); border-color: var(--ink); }
  .noise-mode-row {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    padding: 8px 0 2px; border-top: 1px dashed var(--border); margin-top: 6px;
  }
  .noise-mode-row .sub-label { margin-right: 4px; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top-bar" id="topBar">
    <!-- HEADER -->
    <div class="header">
      <div class="brand">
        <div class="brand-leds">
          <div class="led" style="background:var(--red)"></div>
          <div class="led" style="background:var(--yellow)"></div>
          <div class="led" style="background:var(--green)"></div>
        </div>
        <div class="brand-text">
          <div class="brand-title">YUCCA-FX <em>8-BIT</em></div>
          <div class="brand-sub">CHIPTUNE SFX LABORATORY <b>▮</b></div>
        </div>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>

    <!-- STATUS -->
    <div class="status">
      <span class="status-msg" id="statusMsg">&gt; READY. PRESS [SPACE] TO PLAY · [R] TO RANDOMIZE</span>
      <span class="status-version">v1.0</span>
    </div>

    <!-- TOP OUTPUT WAVEFORM -->
    <div class="scope-bar" id="topScope"></div>
  </div>

  <!-- MAIN -->
  <div class="main-grid" id="mainGrid"></div>

  <!-- DESTROY (drive + circuit bent) -->
  <div style="margin-top:14px"><div id="destroySection"></div></div>
  <!-- MUTANT DELAY -->
  <div style="margin-top:12px"><div id="mutantSection"></div></div>
  <!-- SEQUENCER -->
  <div style="margin-top:12px"><div id="seqSection"></div></div>
  <!-- (factory / presets / export are now in top menu dropdowns) -->

  <div class="footer">
    <div class="footer-help">[ DRAG ADSR POINTS · SPACE PLAYS · R RANDOMIZES · SHARE COPIES URL ]</div>
    <div class="footer-credits">
      <span class="footer-tag">VIBELOPED BY</span>
      <a href="https://yuccabucca.com" target="_blank" rel="noopener" class="footer-brand">yuccabuccA</a>
      <span class="footer-sep">·</span>
      <span class="footer-tag">2026</span>

<script>
/* ===========================================================
   YUCCA-FX 8-BIT  ::  vanilla JS standalone
   =========================================================== */

const C = {
  bg0:'#0a0817', bg1:'#13112b', bg2:'#1d1b3a', bg3:'#272455',
  ink:'#06040f', border:'#3b3470', mute:'#5a5290', text:'#e0d8ff', dim:'#9089c8',
  yellow:'#ffec27', red:'#ff3b4e', green:'#3df56b', cyan:'#3ad7ff',
  magenta:'#ff5dc1', orange:'#ff8a3d', purple:'#a35dff',
};

/* ----- helpers ----- */
const midiToFreq = n => 440 * Math.pow(2, (n - 69) / 12);
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const noteName = n => NOTE_NAMES[((n%12)+12)%12] + (Math.floor(n/12)-1);
const pick = a => a[Math.floor(Math.random()*a.length)];
const rng = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

/* ----- audio engine ----- */
function createPulseWave(ctx, duty) {
  const H = 64;
  const real = new Float32Array(H), imag = new Float32Array(H);
  for (let n = 1; n < H; n++) real[n] = (2/(n*Math.PI)) * Math.sin(n*Math.PI*duty);
  return ctx.createPeriodicWave(real, imag);
}
function createTriPeriodicWave(ctx) {
  const H = 32;
  const real = new Float32Array(H), imag = new Float32Array(H);
  for (let n = 1; n < H; n++) if (n%2===1)
    real[n] = (8/(Math.PI*Math.PI)) * Math.pow(-1,(n-1)/2) / (n*n);
  return ctx.createPeriodicWave(real, imag);
}
function createImpulseResponse(ctx, size) {
  const len = Math.max(2048, Math.floor(ctx.sampleRate * (0.05 + size*1.6)));
  const decay = 1.5 + (1-size)*4;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch=0; ch<2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i=0; i<len; i++) {
      const t = i/len, env = Math.pow(1-t, decay);
      d[i] = Math.round((Math.random()*2-1) * env * 7) / 7 * env;
    }
  }
  return buf;
}

function buildSound(ctx, p, dest, levelGain, startTime) {
  const now = (startTime != null) ? startTime : ctx.currentTime;
  const gainScale = (levelGain == null) ? 1 : levelGain;
  const dur = Math.max(0.02, p.duration);
  const a = Math.max(0.001, p.amp.attack);
  const d = Math.max(0.001, p.amp.decay);
  const r = Math.max(0.001, p.amp.release);
  const sus = Math.max(0.0001, p.amp.sustain);
  const reverbTail = p.reverb.mix > 0.001 ? 1.5 + p.reverb.size*1.8 : 0;
  const delayTail = p.delay.mix > 0.001 ? Math.min(4, p.delay.time*10) : 0;
  const retroTail = (p.retroVerb && p.retroVerb.mix > 0.001)
    ? Math.min(2.5, p.retroVerb.time * (8 + p.retroVerb.feedback * 80)) : 0;
  const totalLen = dur + r + Math.max(reverbTail, delayTail, retroTail) + 0.1;

  const ampGain = ctx.createGain();
  ampGain.gain.setValueAtTime(0.0001, now);
  ampGain.gain.linearRampToValueAtTime(0.85, now + a);
  ampGain.gain.linearRampToValueAtTime(sus*0.85, now + a + d);
  const releaseStart = Math.max(now + a + d, now + dur);
  ampGain.gain.setValueAtTime(sus*0.85, releaseStart);
  ampGain.gain.exponentialRampToValueAtTime(0.0001, releaseStart + r);

  const filter = ctx.createBiquadFilter();
  filter.type = p.filter.type;
  const baseCut = p.filter.cutoff;
  filter.frequency.value = baseCut;
  filter.Q.value = p.filter.resonance;
  if (Math.abs(p.filter.envAmount) > 0.001) {
    const peak = clamp(baseCut * Math.pow(2, p.filter.envAmount*4), 40, 18000);
    filter.frequency.setValueAtTime(peak, now);
    filter.frequency.exponentialRampToValueAtTime(Math.max(40, baseCut), now + a + d);
  }

  let osc, oscFreqParam;
  const baseFreq = midiToFreq(p.pitch.note);
  if (p.osc.type === 'noise') {
    const bufSize = Math.ceil(ctx.sampleRate * totalLen);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    let lfsr = 1;
    const period = Math.max(2, Math.floor(ctx.sampleRate / Math.max(40, baseFreq*4)));
    let counter = 0, bit = 0;
    const tapShort = p.osc.duty < 0.3;
    for (let i=0; i<bufSize; i++) {
      if (counter <= 0) {
        const tap = tapShort ? 6 : 1;
        const fb = (lfsr & 1) ^ ((lfsr >> tap) & 1);
        lfsr = (lfsr >> 1) | (fb << 14);
        bit = (lfsr & 1) ? 0.7 : -0.7;
        counter = period;
      }
      counter--;
      data[i] = bit;
    }
    osc = ctx.createBufferSource();
    osc.buffer = buf;
    oscFreqParam = osc.playbackRate;
    if (Math.abs(p.pitch.pitchEnvAmount) > 0.01) {
      const startRate = Math.pow(2, p.pitch.pitchEnvAmount/12);
      osc.playbackRate.setValueAtTime(Math.max(0.1, startRate), now);
      osc.playbackRate.exponentialRampToValueAtTime(1, now + Math.max(0.01, p.pitch.pitchEnvTime));
    }
  } else {
    osc = ctx.createOscillator();
    if (p.osc.type === 'pulse') osc.setPeriodicWave(createPulseWave(ctx, p.osc.duty));
    else if (p.osc.type === 'triangle') osc.setPeriodicWave(createTriPeriodicWave(ctx));
    else osc.type = 'sawtooth';
    osc.frequency.value = baseFreq;
    oscFreqParam = osc.frequency;
    if (Math.abs(p.pitch.pitchEnvAmount) > 0.01) {
      const startFreq = baseFreq * Math.pow(2, p.pitch.pitchEnvAmount/12);
      const safe = clamp(startFreq, 20, 20000);
      osc.frequency.setValueAtTime(safe, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, baseFreq), now + Math.max(0.01, p.pitch.pitchEnvTime));
    }
  }

  if (p.lfo.depth > 0.001) {
    const lfo = ctx.createOscillator();
    lfo.type = p.lfo.waveform;
    lfo.frequency.value = Math.max(0.05, p.lfo.rate);
    const lfoGain = ctx.createGain();
    if (p.lfo.target === 'pitch') {
      if (p.osc.type === 'noise') lfoGain.gain.value = p.lfo.depth * 0.6;
      else {
        const cents = p.lfo.depth * 1200;
        lfoGain.gain.value = baseFreq * (Math.pow(2, cents/1200) - 1);
      }
      lfo.connect(lfoGain).connect(oscFreqParam);
    } else if (p.lfo.target === 'filter') {
      lfoGain.gain.value = p.lfo.depth * baseCut * 0.85;
      lfo.connect(lfoGain).connect(filter.frequency);
    } else {
      lfoGain.gain.value = p.lfo.depth * 0.45;
      lfo.connect(lfoGain).connect(ampGain.gain);
    }
    lfo.start(now);
    lfo.stop(now + totalLen);
  }

  osc.connect(filter);
  filter.connect(ampGain);

  /* ---- CIRCUIT BENT events: scheduled random parameter pokes ---- */
  if (p.circuitBent && p.circuitBent.enabled && p.circuitBent.intensity > 0.001) {
    const intensity = p.circuitBent.intensity;
    const rate = Math.max(1, p.circuitBent.rate || 12);
    const eventCount = Math.max(1, Math.floor(rate * Math.min(2, dur)));
    for (let i = 0; i < eventCount; i++) {
      const t = now + 0.005 + Math.random() * Math.max(0.01, dur);
      const restoreT = t + 0.005 + Math.random() * 0.04;
      const ev = Math.floor(Math.random() * 6);
      try {
        if (ev === 0) {
          // filter cutoff jump (clamped to safe range)
          const newCut = clamp(baseCut * Math.pow(2, (Math.random() - 0.5) * intensity * 5), 60, 16000);
          filter.frequency.setValueAtTime(newCut, t);
          filter.frequency.setValueAtTime(baseCut, restoreT);
        } else if (ev === 1 && oscFreqParam) {
          // pitch glitch (preserve resonance/volume)
          const isNoise = p.osc.type === 'noise';
          const cur = isNoise ? 1 : baseFreq;
          const shifted = cur * Math.pow(2, (Math.random() - 0.5) * intensity * 2);
          const safe = isNoise ? clamp(shifted, 0.1, 8) : clamp(shifted, 20, 18000);
          oscFreqParam.setValueAtTime(safe, t);
          oscFreqParam.setValueAtTime(cur, restoreT);
        } else if (ev === 2) {
          // amplitude stutter (brief mute) — volume safe, just dips
          ampGain.gain.setValueAtTime(0.0001, t);
          ampGain.gain.setValueAtTime(sus * 0.85, restoreT);
        } else if (ev === 3) {
          // resonance bump (clamped, NEVER above 18 — keep the safety net)
          const curQ = filter.Q.value;
          const bump = clamp(curQ + intensity * 6, 0.1, 18);
          filter.Q.setValueAtTime(bump, t);
          filter.Q.setValueAtTime(curQ, restoreT + 0.05);
        } else if (ev === 4) {
          // amplitude tremor — volume safe, modulates inside existing envelope
          const curAmp = sus * 0.85;
          ampGain.gain.setValueAtTime(curAmp * (1 - intensity * 0.8), t);
          ampGain.gain.linearRampToValueAtTime(curAmp, restoreT);
        } else {
          // filter type micro-shift (only via cutoff sweep up/down hard)
          const sweepEnd = clamp(baseCut * Math.pow(2, (Math.random() < 0.5 ? -1 : 1) * intensity * 3), 60, 16000);
          filter.frequency.setValueAtTime(filter.frequency.value, t);
          filter.frequency.exponentialRampToValueAtTime(sweepEnd, restoreT);
          filter.frequency.exponentialRampToValueAtTime(baseCut, restoreT + 0.04);
        }
      } catch (e) { /* skip events that conflict with scheduled automation */ }
    }
  }

  const fxIn = ctx.createGain();
  ampGain.connect(fxIn);
  const dry = ctx.createGain();
  dry.gain.value = 1;
  fxIn.connect(dry);
  /* ---- DRIVE / DISTORTION (waveshaper, applied to dry+wet) ---- */
  const drive = (p.drive != null ? p.drive : 0);
  const out = ctx.createGain();
  // hard ceiling on output level — drive doesn't break the volume safeguard
  out.gain.value = Math.min(0.7, 0.7 * gainScale);
  // bus that everything (dry + wet fx) routes into
  let mixBus = out;
  if (drive > 0.001) {
    const shaper = ctx.createWaveShaper();
    const k = drive * 60;
    const n = 4096;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i / (n-1)) * 2 - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    shaper.curve = curve;
    shaper.oversample = '2x';
    const shaperIn = ctx.createGain();
    shaperIn.gain.value = 1;
    shaperIn.connect(shaper);
    shaper.connect(out);
    mixBus = shaperIn;
  }
  dry.connect(mixBus);

  if (p.delay.mix > 0.001) {
    const dl = ctx.createDelay(2);
    dl.delayTime.value = Math.max(0.005, p.delay.time);
    const fb = ctx.createGain();
    const fbVal = Math.min(0.9, p.delay.feedback);
    fb.gain.value = fbVal;
    // FEEDBACK FADE — when armed and feedback is high, hold briefly then exponentially decay
    // so runaway echoes are heard but never sustain forever
    if (p.delay.feedbackFade && fbVal > 0.55) {
      const holdEnd = now + 0.2 + 0.4 * (fbVal - 0.55) / 0.35;
      const fadeDur = 0.6 + 1.4 * (fbVal - 0.55) / 0.35;
      const safeTail = 0.35;
      fb.gain.setValueAtTime(fbVal, holdEnd);
      fb.gain.exponentialRampToValueAtTime(safeTail, holdEnd + fadeDur);
    }
    const tone = ctx.createBiquadFilter();
    tone.type = 'lowpass'; tone.frequency.value = 3200;
    fxIn.connect(dl); dl.connect(tone); tone.connect(fb); fb.connect(dl);
    const wet = ctx.createGain();
    wet.gain.value = p.delay.mix;
    tone.connect(wet);
    wet.connect(mixBus);
  }
  if (p.reverb.mix > 0.001) {
    const conv = ctx.createConvolver();
    conv.buffer = createImpulseResponse(ctx, p.reverb.size);
    fxIn.connect(conv);
    const wet = ctx.createGain();
    wet.gain.value = p.reverb.mix * 0.7;
    conv.connect(wet);
    wet.connect(mixBus);
  }
  if (p.retroVerb && p.retroVerb.mix > 0.001) {
    // Slapback / micro-delay — short feedback tap with character
    const dl = ctx.createDelay(0.25);
    dl.delayTime.value = clamp(p.retroVerb.time, 0.001, 0.2);
    const fb = ctx.createGain();
    const fbVal = clamp(p.retroVerb.feedback, 0, 0.95);
    fb.gain.value = fbVal;
    // FEEDBACK FADE — kicks in earlier here since retroVerb's short time can pile up fast
    if (p.retroVerb.feedbackFade && fbVal > 0.5) {
      const holdEnd = now + 0.15 + 0.3 * (fbVal - 0.5) / 0.45;
      const fadeDur = 0.5 + 1.2 * (fbVal - 0.5) / 0.45;
      const safeTail = 0.3;
      fb.gain.setValueAtTime(fbVal, holdEnd);
      fb.gain.exponentialRampToValueAtTime(safeTail, holdEnd + fadeDur);
    }
    // tone shaper in the feedback loop — bandpass-ish to mimic the metallic NES echo
    const tone = ctx.createBiquadFilter();
    tone.type = 'lowpass';
    // tone 0..1 maps to 800..12000 Hz, with Q for that springy/tinny character
    tone.frequency.value = 800 + clamp(p.retroVerb.tone, 0, 1) * 11200;
    tone.Q.value = 1.5 + clamp(p.retroVerb.tone, 0, 1) * 4;
    fxIn.connect(dl); dl.connect(tone); tone.connect(fb); fb.connect(dl);
    const wet = ctx.createGain();
    wet.gain.value = p.retroVerb.mix * 0.85;
    tone.connect(wet);
    wet.connect(mixBus);
  }

  out.connect(dest);
  osc.start(now);
  osc.stop(now + totalLen);
  return totalLen;
}

/* ----- patches ----- */
const initPatch = () => ({
  name: 'INIT',
  osc: { type: 'pulse', duty: 0.5 },
  pitch: { note: 60, pitchEnvAmount: 0, pitchEnvTime: 0.1 },
  amp: { attack: 0.005, decay: 0.1, sustain: 0.5, release: 0.15 },
  filter: { type: 'lowpass', cutoff: 8000, resonance: 1, envAmount: 0 },
  lfo: { rate: 5, depth: 0, target: 'pitch', waveform: 'sine' },
  delay: { time: 0.12, feedback: 0.3, mix: 0, feedbackFade: true },
  reverb: { size: 0.3, mix: 0 },
  retroVerb: { time: 0.025, feedback: 0.5, tone: 0.6, mix: 0, feedbackFade: true },
  drive: 0,
  circuitBent: { enabled: false, intensity: 0.3, rate: 12 },
  mutantDelay: {
    enabled: false, count: 4, time: 0.18, decay: 0.7,
    pitchShift: 0, filterShift: 0, resShift: 0,
    releaseScale: 1, dutyShift: 0, driveShift: 0,
    oscSwap: 0, chaos: 0,
    noNoise: false, onlyNoise: false,
  },
  duration: 0.4,
});

const FACTORY = {
  COIN:    { name:'COIN', osc:{type:'pulse',duty:0.5}, pitch:{note:79,pitchEnvAmount:7,pitchEnvTime:0.05}, amp:{attack:0.005,decay:0.05,sustain:0.6,release:0.1}, filter:{type:'lowpass',cutoff:12000,resonance:0.5,envAmount:0}, lfo:{rate:5,depth:0,target:'pitch',waveform:'sine'}, delay:{time:0.1,feedback:0.2,mix:0}, reverb:{size:0.3,mix:0}, duration:0.18 },
  LASER:   { name:'LASER', osc:{type:'sawtooth',duty:0.5}, pitch:{note:76,pitchEnvAmount:-36,pitchEnvTime:0.18}, amp:{attack:0.001,decay:0.05,sustain:0.7,release:0.05}, filter:{type:'lowpass',cutoff:6000,resonance:8,envAmount:-0.4}, lfo:{rate:18,depth:0.15,target:'pitch',waveform:'sine'}, delay:{time:0.08,feedback:0.4,mix:0.2}, reverb:{size:0.4,mix:0.15}, duration:0.22 },
  EXPLODE: { name:'EXPLODE', osc:{type:'noise',duty:0.5}, pitch:{note:50,pitchEnvAmount:12,pitchEnvTime:0.4}, amp:{attack:0.001,decay:0.3,sustain:0.2,release:0.5}, filter:{type:'lowpass',cutoff:4000,resonance:2,envAmount:-0.6}, lfo:{rate:8,depth:0.2,target:'amp',waveform:'square'}, delay:{time:0.15,feedback:0.5,mix:0.2}, reverb:{size:0.7,mix:0.3}, duration:0.6 },
  JUMP:    { name:'JUMP', osc:{type:'pulse',duty:0.25}, pitch:{note:67,pitchEnvAmount:14,pitchEnvTime:0.12}, amp:{attack:0.002,decay:0.06,sustain:0.4,release:0.08}, filter:{type:'lowpass',cutoff:9000,resonance:1,envAmount:0}, lfo:{rate:5,depth:0,target:'pitch',waveform:'sine'}, delay:{time:0.1,feedback:0.2,mix:0}, reverb:{size:0.2,mix:0}, duration:0.18 },
  POWERUP: { name:'POWERUP', osc:{type:'pulse',duty:0.5}, pitch:{note:60,pitchEnvAmount:24,pitchEnvTime:0.3}, amp:{attack:0.005,decay:0.1,sustain:0.7,release:0.15}, filter:{type:'lowpass',cutoff:10000,resonance:1,envAmount:0.3}, lfo:{rate:14,depth:0.08,target:'pitch',waveform:'square'}, delay:{time:0.06,feedback:0.35,mix:0.18}, reverb:{size:0.4,mix:0.1}, duration:0.4 },
  HURT:    { name:'HURT', osc:{type:'pulse',duty:0.125}, pitch:{note:64,pitchEnvAmount:-12,pitchEnvTime:0.15}, amp:{attack:0.001,decay:0.08,sustain:0.4,release:0.12}, filter:{type:'highpass',cutoff:400,resonance:4,envAmount:0}, lfo:{rate:22,depth:0.3,target:'pitch',waveform:'sine'}, delay:{time:0.1,feedback:0.25,mix:0}, reverb:{size:0.3,mix:0}, duration:0.25 },
};

function randomPatch() {
  const wild = Math.random() < 0.45;
  const oscType = pick(['pulse','pulse','pulse','triangle','sawtooth','noise']);
  return {
    name: 'RND' + Math.floor(Math.random()*99).toString().padStart(2,'0'),
    osc: { type: oscType, duty: pick([0.125, 0.25, 0.5, 0.75]) },
    pitch: {
      note: oscType==='noise' ? Math.floor(rng(36,84)) : Math.floor(rng(28,84)),
      pitchEnvAmount: rng(-36,36) * (wild?1:0.5),
      pitchEnvTime: rng(0.01, wild?0.6:0.3),
    },
    amp: {
      attack: Math.random()<0.7 ? rng(0.001,0.02) : rng(0.05,0.4),
      decay: rng(0.02, 0.4),
      sustain: Math.random()<0.4 ? 0 : rng(0.1,0.9),
      release: rng(0.05, wild?0.8:0.4),
    },
    filter: {
      type: pick(['lowpass','lowpass','highpass','bandpass']),
      cutoff: rng(200, 12000),
      resonance: rng(0.5, wild?18:8),
      envAmount: Math.random()<0.5 ? 0 : rng(-1,1),
    },
    lfo: {
      rate: rng(0.5, wild?35:15),
      depth: Math.random()<0.4 ? 0 : rng(0.05, wild?0.9:0.5),
      target: pick(['pitch','filter','amp']),
      waveform: pick(['sine','square','triangle','sawtooth']),
    },
    delay: {
      time: rng(0.04, 0.35),
      feedback: rng(0.1, 0.7),
      mix: Math.random()<0.5 ? 0 : rng(0.1, 0.5),
    },
    reverb: {
      size: rng(0.1, 0.9),
      mix: Math.random()<0.6 ? 0 : rng(0.1, 0.45),
    },
    duration: rng(0.08, wild?0.9:0.5),
  };
}

/* ----- export ----- */
let lameLoad = null;
function loadLame() {
  if (lameLoad) return lameLoad;
  lameLoad = new Promise((resolve, reject) => {
    if (window.lamejs) return resolve(window.lamejs);
    const tryUrl = url => new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = url; s.onload = () => res(window.lamejs); s.onerror = rej;
      document.head.appendChild(s);
    });
    tryUrl('https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js')
      .then(resolve)
      .catch(() => tryUrl('https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js')
        .then(resolve).catch(reject));
  });
  return lameLoad;
}

async function renderToBuffer(p, renderOpts) {
  const sr = 44100;
  // export-mode opts; default uses state.export but the scope renderer overrides to force mono
  const stereo = renderOpts && renderOpts.stereo === true; // default mono
  const channels = stereo ? 2 : 1;
  const normalize = !!(renderOpts && renderOpts.normalize);
  const normTarget = (renderOpts && typeof renderOpts.normalizeTarget === 'number') ? renderOpts.normalizeTarget : -6;

  // Compute the maximum tail across the base patch and any mutant-delay copies
  function patchTail(patch) {
    const reverbTail = patch.reverb.mix > 0.001 ? 1.5 + patch.reverb.size*1.8 : 0;
    const delayTail = patch.delay.mix > 0.001 ? Math.min(4, patch.delay.time*10) : 0;
    const retroTail = (patch.retroVerb && patch.retroVerb.mix > 0.001)
      ? Math.min(2.5, patch.retroVerb.time * (8 + patch.retroVerb.feedback * 80)) : 0;
    return Math.max(reverbTail, delayTail, retroTail);
  }

  let total = p.duration + p.amp.release + patchTail(p);

  // If mutant delay is on, account for the longest cascade copy's full tail
  const steps = getMutantSteps(p);
  const md = p.mutantDelay;
  const opts = md ? { noNoise: md.noNoise, onlyNoise: md.onlyNoise } : null;
  let cascadeEnd = 0;
  steps.forEach(step => {
    const m = mutatePatch(p, step.mutations, opts);
    const end = step.delay + m.duration + m.amp.release + patchTail(m);
    if (end > cascadeEnd) cascadeEnd = end;
  });
  total = Math.max(total, cascadeEnd) + 0.5;

  // Cap to a safe maximum so chaotic patches don't blow up the export
  total = Math.min(total, 30);

  const ctx = new OfflineAudioContext(channels, Math.ceil(total * sr), sr);

  // Main hit at t=0
  buildSound(ctx, p, ctx.destination, 1.0, 0);
  // Mutant-delay copies at their offsets (drive + circuit bent come along inside buildSound)
  steps.forEach(step => {
    const mutated = mutatePatch(p, step.mutations, opts);
    try { buildSound(ctx, mutated, ctx.destination, step.gain, step.delay); }
    catch (e) { /* skip bad copy, keep going */ }
  });

  const rendered = await ctx.startRendering();
  const trimmed = trimSilence(rendered);
  return normalize ? normalizeBuffer(trimmed, normTarget) : trimmed;
}

// Peak-normalize in place to a target dBFS (default -6).
// -6 dBFS leaves headroom for downstream FX/spatialization in a game engine.
// Use -3 for hotter masters, -1 for max level just under clipping.
function normalizeBuffer(buffer, targetDbfs) {
  const target = Math.pow(10, (targetDbfs == null ? -6 : targetDbfs) / 20);
  let peak = 0;
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < data.length; i++) {
      const a = Math.abs(data[i]);
      if (a > peak) peak = a;
    }
  }
  if (peak < 0.0001) return buffer; // silence — leave alone, don't blow it up
  const gain = target / peak;
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < data.length; i++) data[i] *= gain;
  }
  return buffer;
}

// Trim trailing (and leading) silence with a small natural pad to avoid clicks
function trimSilence(buffer, threshold = 0.0006) {
  const channels = buffer.numberOfChannels;
  const len = buffer.length;
  // find last non-silent sample across all channels
  let lastNonSilent = -1;
  for (let i = len - 1; i >= 0; i--) {
    let loud = false;
    for (let ch = 0; ch < channels; ch++) {
      if (Math.abs(buffer.getChannelData(ch)[i]) >= threshold) { loud = true; break; }
    }
    if (loud) { lastNonSilent = i; break; }
  }
  if (lastNonSilent < 0) return buffer; // whole thing was silent — leave it alone

  // find first non-silent sample
  let firstNonSilent = len;
  for (let i = 0; i < len; i++) {
    let loud = false;
    for (let ch = 0; ch < channels; ch++) {
      if (Math.abs(buffer.getChannelData(ch)[i]) >= threshold) { loud = true; break; }
    }
    if (loud) { firstNonSilent = i; break; }
  }

  // Pad: ~5ms head, ~50ms tail to let release/reverb breathe naturally
  const sr = buffer.sampleRate;
  const headPad = Math.floor(sr * 0.005);
  const tailPad = Math.floor(sr * 0.05);
  const start = Math.max(0, firstNonSilent - headPad);
  const end = Math.min(len, lastNonSilent + 1 + tailPad);
  const newLen = end - start;
  if (newLen >= len) return buffer;

  let trimmed;
  try {
    trimmed = new AudioBuffer({ length: newLen, sampleRate: sr, numberOfChannels: channels });
  } catch {
    // fallback for older browsers
    const tmp = new OfflineAudioContext(channels, newLen, sr);
    trimmed = tmp.createBuffer(channels, newLen, sr);
  }
  for (let ch = 0; ch < channels; ch++) {
    const src = buffer.getChannelData(ch);
    const dst = trimmed.getChannelData(ch);
    for (let i = 0; i < newLen; i++) dst[i] = src[start + i];
  }
  return trimmed;
}

function bufferToWav(buffer) {
  const channels = buffer.numberOfChannels;
  const sr = buffer.sampleRate;
  const len = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = channels * bytesPerSample;
  const byteRate = sr * blockAlign;
  const dataBytes = len * blockAlign;
  const buf = new ArrayBuffer(44 + dataBytes);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0, 'RIFF'); v.setUint32(4, 36 + dataBytes, true); w(8, 'WAVE');
  w(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, channels, true); v.setUint32(24, sr, true);
  v.setUint32(28, byteRate, true); v.setUint16(32, blockAlign, true); v.setUint16(34, 16, true);
  w(36, 'data'); v.setUint32(40, dataBytes, true);
  // Cache channel arrays once, then interleave
  const data = [];
  for (let ch = 0; ch < channels; ch++) data.push(buffer.getChannelData(ch));
  let o = 44;
  for (let i = 0; i < len; i++) {
    for (let ch = 0; ch < channels; ch++) {
      const s = clamp(data[ch][i], -1, 1);
      v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      o += 2;
    }
  }
  return new Blob([buf], { type: 'audio/wav' });
}

async function exportMp3(p, renderOpts) {
  const lame = await loadLame();
  const buffer = await renderToBuffer(p, renderOpts);
  const sr = buffer.sampleRate;
  const channels = buffer.numberOfChannels;
  const len = buffer.length;
  // Convert to int16 per channel
  const left = new Int16Array(len);
  const right = channels >= 2 ? new Int16Array(len) : null;
  const lData = buffer.getChannelData(0);
  const rData = channels >= 2 ? buffer.getChannelData(1) : null;
  for (let i = 0; i < len; i++) {
    const sl = clamp(lData[i], -1, 1);
    left[i] = sl < 0 ? sl * 0x8000 : sl * 0x7FFF;
    if (right) {
      const sr_ = clamp(rData[i], -1, 1);
      right[i] = sr_ < 0 ? sr_ * 0x8000 : sr_ * 0x7FFF;
    }
  }
  const enc = new lame.Mp3Encoder(channels, sr, 192);
  const chunks = [];
  const block = 1152;
  for (let i = 0; i < len; i += block) {
    const lChunk = left.subarray(i, i + block);
    const b = right
      ? enc.encodeBuffer(lChunk, right.subarray(i, i + block))
      : enc.encodeBuffer(lChunk);
    if (b.length) chunks.push(b);
  }
  const tail = enc.flush();
  if (tail.length) chunks.push(tail);
  return new Blob(chunks, { type: 'audio/mp3' });
}

function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

/* ----- url share ----- */
function patchToHash(p) {
  const json = JSON.stringify(p);
  return btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function hashToPatch(hash) {
  try {
    let b64 = hash.replace(/-/g,'+').replace(/_/g,'/');
    while (b64.length % 4) b64 += '=';
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  } catch { return null; }
}

// Deterministic hash → 0..1 (so variations groove instead of flicker)
function hash01(...vals) {
  let h = 2166136261;
  for (const v of vals) {
    const s = String(v);
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
  }
  return ((h >>> 0) % 100000) / 100000;
}

// Bjorklund-style euclidean rhythm — even pulse distribution
function euclideanRhythm(pulses, steps) {
  pulses = clamp(Math.floor(pulses), 0, steps);
  if (pulses === 0) return new Array(steps).fill(0);
  if (pulses === steps) return new Array(steps).fill(1);
  const pattern = [];
  let bucket = 0;
  for (let i = 0; i < steps; i++) {
    bucket += pulses;
    if (bucket >= steps) { bucket -= steps; pattern.push(1); }
    else pattern.push(0);
  }
  // rotate so pattern starts on a hit
  while (pattern[0] !== 1) pattern.push(pattern.shift());
  return pattern;
}

// Mutate a patch by a mutations object (used by mutant delay + sequencer variation)
// opts.noNoise / opts.onlyNoise constrain the OSC SWAP / chaos osc selection
function mutatePatch(base, m, opts) {
  const p = JSON.parse(JSON.stringify(base));
  if (!m) return p;
  const noNoise = opts && opts.noNoise;
  const onlyNoise = opts && opts.onlyNoise;

  // Force noise mode for the whole mutated patch if onlyNoise is on
  if (onlyNoise) p.osc.type = 'noise';

  if (m.pitchShift) p.pitch.note = clamp(p.pitch.note + m.pitchShift, 12, 108);
  if (m.filterShift) p.filter.cutoff = clamp(p.filter.cutoff * Math.pow(2, m.filterShift), 40, 18000);
  if (m.resShift) p.filter.resonance = clamp(p.filter.resonance + m.resShift, 0.1, 18);
  if (m.releaseScale && m.releaseScale !== 1) p.amp.release = clamp(p.amp.release * m.releaseScale, 0.001, 2.5);
  if (m.dutyShift && p.osc.type === 'pulse') p.osc.duty = clamp(p.osc.duty + m.dutyShift, 0.06, 0.94);
  if (m.driveShift) p.drive = clamp((p.drive || 0) + m.driveShift, 0, 1);
  if (m.oscSwap && Math.random() < m.oscSwap) {
    if (onlyNoise) {
      // Only noise — randomize the *kind* of noise via duty (long tap >= 0.3, short/metal < 0.3)
      p.osc.type = 'noise';
      p.osc.duty = pick([0.1, 0.18, 0.42, 0.6, 0.85]);
    } else if (noNoise) {
      p.osc.type = pick(['pulse', 'triangle', 'sawtooth']);
    } else {
      p.osc.type = pick(['pulse','triangle','sawtooth','noise']);
    }
  }
  if (m.chaos > 0) {
    const c = m.chaos;
    p.pitch.note = clamp(p.pitch.note + (Math.random()-0.5) * c * 24, 12, 108);
    p.filter.cutoff = clamp(p.filter.cutoff * Math.pow(2, (Math.random()-0.5) * c * 4), 40, 18000);
    p.filter.resonance = clamp(p.filter.resonance + (Math.random()-0.5) * c * 8, 0.1, 18);
    p.amp.release = clamp(p.amp.release * Math.pow(2, (Math.random()-0.5) * c), 0.001, 2.5);
    if (Math.random() < c * 0.4) {
      if (onlyNoise) {
        p.osc.type = 'noise';
        p.osc.duty = pick([0.1, 0.18, 0.42, 0.6, 0.85]);
      } else if (noNoise) {
        p.osc.type = pick(['pulse','triangle','sawtooth']);
      } else {
        p.osc.type = pick(['pulse','triangle','sawtooth','noise']);
      }
    }
    if (p.osc.type === 'pulse') p.osc.duty = clamp(p.osc.duty + (Math.random()-0.5) * c * 0.5, 0.06, 0.94);
    p.drive = clamp((p.drive||0) + Math.random() * c * 0.6, 0, 1);
  }

  // After all mutations, if onlyNoise was set, double-check we didn't drift off it
  if (onlyNoise) p.osc.type = 'noise';

  return p;
}

// Build the sequence of mutant-delay steps (each step gets accumulating mutations)
function getMutantSteps(patch) {
  const md = patch.mutantDelay;
  if (!md || !md.enabled || md.count < 1) return [];
  const out = [];
  for (let i = 1; i <= md.count; i++) {
    out.push({
      delay: i * md.time,
      gain: Math.pow(md.decay, i),
      mutations: {
        pitchShift: md.pitchShift * i,
        filterShift: md.filterShift * i,
        resShift: md.resShift * i,
        releaseScale: Math.pow(md.releaseScale, i),
        dutyShift: md.dutyShift * i,
        driveShift: md.driveShift * i,
        oscSwap: md.oscSwap,         // probability per step
        chaos: md.chaos * (i / md.count),
      }
    });
  }
  return out;
}

// Variation engine for the sequencer (deterministic per track+step+seed)
function applyVariation(patch, trackIdx, stepIdx, variation) {
  if (!variation || !variation.enabled || variation.amount < 0.001) return patch;
  const seed = variation.seed;
  const amt = variation.amount;
  // pseudo-random in [-1, 1] from hash
  const n = (k) => (hash01(seed, trackIdx, stepIdx, k) * 2 - 1);
  return mutatePatch(patch, {
    pitchShift: variation.pitchDrift > 0 ? Math.round(n('p') * variation.pitchDrift * amt) : 0,
    filterShift: variation.filterDrift > 0 ? n('f') * variation.filterDrift * amt : 0,
    releaseScale: variation.decayDrift > 0 ? Math.pow(2, n('d') * variation.decayDrift * amt) : 1,
    dutyShift: variation.dutyDrift > 0 ? n('u') * variation.dutyDrift * amt * 0.5 : 0,
    driveShift: variation.driveDrift > 0 ? n('v') * variation.driveDrift * amt * 0.5 : 0,
    oscSwap: variation.oscChance > 0 ? variation.oscChance * amt : 0,
  }, { noNoise: variation.noNoise, onlyNoise: variation.onlyNoise });
}

const state = {
  patch: initPatch(),
  presets: [],
  audioCtx: null,

  suppressedConfirms: {},
};

const subscribers = []; // [{ refresh: () => void }]
function subscribe(s) { subscribers.push(s); return s; }
function refreshAll() {
  subscribers.forEach(s => s.refresh && s.refresh());
  scheduleScopeRender();
}

// Live listeners fire on every patch path change (e.g. while dragging a slider)
// Register with subscribeLive('filter', () => {...}) to redraw on any filter.* change
const liveListeners = []; // [{ prefix: 'filter', fn: () => void }]
function subscribeLive(prefix, fn) { liveListeners.push({ prefix, fn }); return fn; }
function notifyLive(path) {
  for (let i = 0; i < liveListeners.length; i++) {
    const l = liveListeners[i];
    if (path === l.prefix || path.startsWith(l.prefix + '.')) {
      try { l.fn(); } catch {}
    }
  }
}

function setPatch(newPatch) {
  // Merge with defaults so old presets / factory / random patches without new fields don't crash
  const def = initPatch();
  const incoming = JSON.parse(JSON.stringify(newPatch));
  state.patch = {
    ...def,
    ...incoming,
    osc:         { ...def.osc,         ...(incoming.osc         || {}) },
    pitch:       { ...def.pitch,       ...(incoming.pitch       || {}) },
    amp:         { ...def.amp,         ...(incoming.amp         || {}) },
    filter:      { ...def.filter,      ...(incoming.filter      || {}) },
    lfo:         { ...def.lfo,         ...(incoming.lfo         || {}) },
    delay:       { ...def.delay,       ...(incoming.delay       || {}) },
    reverb:      { ...def.reverb,      ...(incoming.reverb      || {}) },
    retroVerb:   { ...def.retroVerb,   ...(incoming.retroVerb   || {}) },
    circuitBent: { ...def.circuitBent, ...(incoming.circuitBent || {}) },
    mutantDelay: { ...def.mutantDelay, ...(incoming.mutantDelay || {}) },
  };
  refreshAll();
}

function updatePath(path, value) {
  const parts = path.split('.');
  let cur = state.patch;
  for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
  cur[parts[parts.length-1]] = value;
  notifyLive(path);
}

function getPath(path) {
  const parts = path.split('.');
  let cur = state.patch;
  for (const p of parts) cur = cur[p];
  return cur;
}

function ensureCtx() {
  if (state.audioCtx) {
    if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
    return state.audioCtx;
  }
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return state.audioCtx;
}

// Trigger one playback cascade: main hit + mutant-delay copies
function triggerPatch(basePatch) {
  const ctx = ensureCtx();
  buildSound(ctx, basePatch, ctx.destination, 1.0);
  const steps = getMutantSteps(basePatch);
  const md = basePatch.mutantDelay;
  const opts = md ? { noNoise: md.noNoise, onlyNoise: md.onlyNoise } : null;
  steps.forEach(step => {
    const mutated = mutatePatch(basePatch, step.mutations, opts);
    setTimeout(() => {
      try { buildSound(ctx, mutated, ctx.destination, step.gain); }
      catch (e) { /* ignore */ }
    }, step.delay * 1000);
  });
}

function playSound() {
  triggerPatch(state.patch);
}

  const seq = state.sequencer;

  if (seq.timer) { clearTimeout(seq.timer); seq.timer = null; }

function seqTick() {
  const seq = state.sequencer;
  if (!seq.playing) return;
  const stepDur = (60 / Math.max(20, seq.bpm)) / 4; // 16th notes
  seq.tracks.forEach((track, ti) => {
    if (!track.enabled || !track._pattern) return;
    const pat = track._pattern;
    const stepInTrack = seq.step % pat.length;
    if (pat[stepInTrack] === 1) {
      let p = JSON.parse(JSON.stringify(state.patch));
      p.pitch.note = clamp(p.pitch.note + track.pitchOffset, 12, 108);
      p = applyVariation(p, ti, seq.step, seq.variation);
      triggerPatch(p);
      flashLissajous(track.color);
    }
  });
  seq.step = (seq.step + 1) % 64;
  if (sequencerSubs.refresh) sequencerSubs.refresh();
  seq.timer = setTimeout(seqTick, stepDur * 1000);
}

/* ===========================================================
   LISSAJOUS RENDERER
   =========================================================== */
const lissajous = {
  canvas: null,
  raf: null,
  phase: 0,
  xRatio: 3,
  yRatio: 2,
  xPhase: 0,
  flashColor: null,
  flashTime: 0,
};

function startLissajous() {
  if (lissajous.raf) return;
  function frame() {
    const canvas = lissajous.canvas;
    if (!canvas) { lissajous.raf = null; return; }
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) {
      lissajous.raf = requestAnimationFrame(frame);
      return;
    }
    if (canvas.width !== rect.width * dpr) {
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
    }
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;

    // phosphor fade trail
    ctx.fillStyle = 'rgba(6, 4, 15, 0.08)';
    ctx.fillRect(0, 0, w, h);

    const flashAge = performance.now() - lissajous.flashTime;
    const color = (flashAge < 220 && lissajous.flashColor) ? lissajous.flashColor : C.green;
    ctx.strokeStyle = color;
    ctx.lineWidth = flashAge < 80 ? 2.5 : 1.4;
    ctx.shadowColor = color;
    ctx.shadowBlur = flashAge < 120 ? 8 : 3;

    const r = Math.min(w, h) / 2 - 8;
    const segments = 220;
    ctx.beginPath();
    for (let i = 0; i < segments; i++) {
      const t = lissajous.phase + i * 0.0042;
      const x = w/2 + Math.sin(t * lissajous.xRatio + lissajous.xPhase) * r;
      const y = h/2 + Math.sin(t * lissajous.yRatio) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    lissajous.phase += 0.45;
    lissajous.raf = requestAnimationFrame(frame);
  }
  frame();
}

function flashLissajous(color) {
  lissajous.flashColor = color;
  lissajous.flashTime = performance.now();
}

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'style') Object.assign(e.style, props[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === 'html') e.innerHTML = props[k];
    else e.setAttribute(k, props[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

// Custom slider for values that don't live on state.patch (lissajous, sequencer, etc).
// Doesn't subscribe to refreshAll, so safe for non-patch state.
// A reusable pill toggle for boolean state, optionally subscribing to refresh
function makeBoolPill(label, getValue, setValue, opts) {
  const pill = el('button', { class: 'pill-toggle' }, label);
  function sync() { pill.classList.toggle('on', !!getValue()); }
  pill.addEventListener('click', (e) => {
    e.stopPropagation();
    setValue(!getValue());
    sync();
    if (opts && opts.onChange) opts.onChange();
  });
  sync();
  subscribe({ refresh: sync });
  return pill;
}

function makeCustomSlider({ label, getValue, setValue, min, max, step = 0.01, accent = C.yellow, format, onChange }) {
  const labelEl = el('span', { class: 'slider-label', style: { color: C.dim }}, label);
  const valueEl = el('span', { class: 'slider-value', style: { color: accent }});
  const fill = el('div', { class: 'slider-fill', style: { background: accent }});
  const thumb = el('div', { class: 'slider-thumb', style: { background: accent }});
  const trackEl = el('div', { class: 'slider-track' }, fill, thumb);
  const wrap = el('div', { class: 'slider' },
    el('div', { class: 'slider-header' }, labelEl, valueEl),
    trackEl
  );
  function update() {
    const v = getValue();
    const pct = clamp((v - min) / (max - min), 0, 1);
    fill.style.width = (pct * 100) + '%';
    thumb.style.left = (pct * 100) + '%';
    valueEl.textContent = format ? format(v) : v.toFixed(2);
  }
  function ptv(e) {
    const rect = trackEl.getBoundingClientRect();
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    const pct = rect.width === 0 ? 0 : x / rect.width;
    let raw = min + pct * (max - min);
    raw = Math.round(raw / step) * step;
    setValue(clamp(raw, min, max));
    update();
    if (onChange) onChange();
  }
  let dragging = false;
  trackEl.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    trackEl.setPointerCapture(e.pointerId);
    ptv(e);
  });
  trackEl.addEventListener('pointermove', e => { if (dragging) ptv(e); });
  const end = e => {
    if (dragging) {
      dragging = false;
      try { trackEl.releasePointerCapture(e.pointerId); } catch {}
    }
  };
  trackEl.addEventListener('pointerup', end);
  trackEl.addEventListener('pointercancel', end);
  update();
  return { element: wrap, refresh: update };
}

function makeSection(title, accentColor, options) {
  const opts = options || {};
  const dot = el('div', { class: 'section-dot', style: { background: accentColor }});
  const titleEl = el('span', { class: 'section-title', style: { color: accentColor }}, title);
  const head = el('div', { class: 'section-head section-head-clickable' }, dot, titleEl);

  // Optional ON/OFF pill — placed before the chevron, with its own click handler
  let toggleEl = null;
  if (opts.onOff) {
    toggleEl = el('button', { class: 'section-toggle' }, 'OFF');
    function syncToggle() {
      const on = !!opts.onOff.isOn();
      toggleEl.textContent = on ? 'ON' : 'OFF';
      toggleEl.classList.toggle('on', on);
    }
    toggleEl.addEventListener('click', e => {
      e.stopPropagation(); // don't bubble to the head's collapse handler
      const on = !!opts.onOff.isOn();
      opts.onOff.setOn(!on);
      syncToggle();
    });
    head.appendChild(toggleEl);
    syncToggle();
    subscribe({ refresh: syncToggle });
  }

  const chevron = el('span', { class: 'section-chevron', style: { color: accentColor }}, '▾');
  head.appendChild(chevron);

  const content = el('div', { class: 'section-content' });
  const wrap = el('div', { class: 'section', style: { gap: '10px' }}, head, content);

  let collapsed = !!opts.startCollapsed;
  function applyState() {
    content.style.display = collapsed ? 'none' : '';
    chevron.textContent = collapsed ? '▸' : '▾';
    wrap.classList.toggle('collapsed', collapsed);
  }
  applyState();
  head.addEventListener('click', (e) => {
    if (e.target.closest('input, button, .slider-track, .section-toggle')) return;
    collapsed = !collapsed;
    applyState();
  });

  return { element: wrap, body: content, titleEl, head, chevron, toggleEl };
}

/* ===== Filter response visualizer ===== */
function makeFilterViz() {
  const canvas = el('canvas', { class: 'filter-viz' });
  let raf = null;
  function draw() {
    raf = null;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) return;
    if (canvas.width !== Math.floor(rect.width * dpr) || canvas.height !== Math.floor(rect.height * dpr)) {
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
    }
    const c = canvas.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;
    c.fillStyle = C.ink;
    c.fillRect(0, 0, w, h);

    // Compute response via a throwaway BiquadFilterNode
    const ac = ensureCtx();
    const f = ac.createBiquadFilter();
    f.type = state.patch.filter.type;
    f.frequency.value = state.patch.filter.cutoff;
    f.Q.value = state.patch.filter.resonance;
    const N = Math.max(80, Math.floor(w));
    const minLog = Math.log(20), maxLog = Math.log(20000);
    const freqArr = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      freqArr[i] = Math.exp(minLog + (i / (N - 1)) * (maxLog - minLog));
    }
    const magArr = new Float32Array(N);
    const phaseArr = new Float32Array(N);
    f.getFrequencyResponse(freqArr, magArr, phaseArr);

    // dB axis: -36..+18
    const minDb = -36, maxDb = 18;
    const dbToY = db => h - ((db - minDb) / (maxDb - minDb)) * h;
    const fToX = freq => ((Math.log(freq) - minLog) / (maxLog - minLog)) * w;

    // Grid: 0dB line + decade marks
    c.strokeStyle = C.bg3;
    c.lineWidth = 1;
    [100, 1000, 10000].forEach(freq => {
      const x = fToX(freq);
      c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke();
    });
    c.beginPath(); c.moveTo(0, dbToY(0)); c.lineTo(w, dbToY(0)); c.stroke();

    // Cutoff vertical
    const cutX = fToX(state.patch.filter.cutoff);
    c.strokeStyle = C.dim;
    c.setLineDash([3, 3]);
    c.beginPath(); c.moveTo(cutX, 0); c.lineTo(cutX, h); c.stroke();
    c.setLineDash([]);

    // Response curve, color by filter type
    const filterColor = ({
      lowpass: C.cyan, highpass: C.orange, bandpass: C.magenta,
      notch: C.purple, peaking: C.yellow, lowshelf: C.green, highshelf: C.green, allpass: C.red,
    })[state.patch.filter.type] || C.cyan;
    c.strokeStyle = filterColor;
    c.lineWidth = 2;
    c.shadowColor = filterColor;
    c.shadowBlur = 4;
    c.beginPath();
    for (let i = 0; i < N; i++) {
      const x = (i / (N - 1)) * w;
      const db = 20 * Math.log10(Math.max(0.0001, magArr[i]));
      const y = dbToY(clamp(db, minDb, maxDb));
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
    }
    c.stroke();
    c.shadowBlur = 0;

    // Cutoff label
    c.fillStyle = C.dim;
    c.font = '8px ' + 'monospace';
    const cutoff = state.patch.filter.cutoff;
    const cutLabel = cutoff >= 1000 ? (cutoff / 1000).toFixed(1) + 'k' : Math.round(cutoff) + 'Hz';
    c.fillText(cutLabel, Math.min(cutX + 4, w - 30), 11);
    c.fillStyle = C.bg3;
    c.fillText('20Hz', 2, h - 3);
    c.fillText('20kHz', w - 28, h - 3);
  }
  function scheduleDraw() {
    if (raf) return;
    raf = requestAnimationFrame(draw);
  }
  return { element: canvas, draw: scheduleDraw };
}

/* ===== Dropdown menu ===== */
function makeDropdown(triggerLabel, accentColor, contentBuilder) {
  const wrap = el('div', { class: 'menu-wrap' });
  const trigger = el('button', { class: 'menu-btn', style: { color: accentColor }});
  trigger.appendChild(el('span', {}, triggerLabel));
  trigger.appendChild(el('span', { class: 'menu-chevron' }, '▾'));
  const popup = el('div', { class: 'menu-popup hidden' });
  contentBuilder(popup);
  popup.addEventListener('click', e => e.stopPropagation());
  wrap.appendChild(trigger);
  // popup is appended to body so it floats free of any overflow/sticky parent
  document.body.appendChild(popup);

  function positionPopup() {
    const tr = trigger.getBoundingClientRect();
    const margin = 8;
    const vw = window.innerWidth, vh = window.innerHeight;
    // measure naturally first by placing flush at trigger.left
    popup.style.top = (tr.bottom + 4) + 'px';
    popup.style.left = tr.left + 'px';
    popup.style.right = 'auto';
    // now check overflow
    const pr = popup.getBoundingClientRect();
    if (pr.right > vw - margin) {
      // anchor to right side instead
      popup.style.left = 'auto';
      popup.style.right = (vw - tr.right) + 'px';
      // re-check left bound
      const pr2 = popup.getBoundingClientRect();
      if (pr2.left < margin) {
        // popup wider than possible — pin to viewport with side margins
        popup.style.left = margin + 'px';
        popup.style.right = margin + 'px';
        popup.style.width = (vw - margin*2) + 'px';
      }
    }
    // clamp height: ensure popup fits between top and bottom of viewport
    const maxH = Math.max(160, vh - tr.bottom - 16);
    popup.style.maxHeight = maxH + 'px';
  }

  function close() {
    popup.classList.add('hidden');
    trigger.classList.remove('open');
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = !popup.classList.contains('hidden');
    document.querySelectorAll('.menu-popup:not(.hidden)').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
    if (!isOpen) {
      popup.classList.remove('hidden');
      trigger.classList.add('open');
      positionPopup();
    }
  });
  // reposition on viewport changes while open
  window.addEventListener('resize', () => {
    if (!popup.classList.contains('hidden')) positionPopup();
  });
  window.addEventListener('scroll', () => {
    if (!popup.classList.contains('hidden')) positionPopup();
  }, true);

  return { element: wrap, trigger, popup, close };
}

/* Global click-away + ESC closes dropdowns and modals */
document.addEventListener('click', () => {
  document.querySelectorAll('.menu-popup:not(.hidden)').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.menu-popup:not(.hidden)').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
  }
});

/* ===== Confirm modal ===== */
// Optional `dontShowAgainKey` (string) ties this confirm to state.suppressedConfirms[key].
// First time: shows modal with a checkbox CHECKED by default. If user confirms with the box
// still checked, future calls with the same key skip the modal. If they uncheck before confirming,
// the suppression is lifted (popup will show next time too).
function showConfirm({ title, message, confirmLabel = 'CONFIRM', cancelLabel = 'CANCEL', accent, onConfirm, dontShowAgainKey, dontShowAgainLabel }) {
  if (dontShowAgainKey && state.suppressedConfirms[dontShowAgainKey]) {
    if (onConfirm) onConfirm();
    return;
  }
  const overlay = el('div', { class: 'modal-overlay' });
  const modal = el('div', { class: 'modal' });
  modal.appendChild(el('div', { class: 'modal-title', style: { color: accent || C.red }}, title));
  modal.appendChild(el('div', { class: 'modal-message' }, message));

  // Optional "don't show again" checkbox — defaults to CHECKED so a single confirm flow
  // suppresses future popups; user can uncheck to keep the popup armed
  let dsaCheckbox = null;
  if (dontShowAgainKey) {
    const wrap = el('label', { class: 'modal-dsa' });
    dsaCheckbox = el('input', { type: 'checkbox' });
    dsaCheckbox.checked = true; // default checked
    wrap.appendChild(dsaCheckbox);
    wrap.appendChild(el('span', {}, dontShowAgainLabel || "DON'T SHOW AGAIN THIS SESSION"));
    modal.appendChild(wrap);
  }

  const btnRow = el('div', { class: 'modal-buttons' });
  function dismiss() {
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  }
  const onKey = e => {
    if (e.key === 'Escape') dismiss();
    else if (e.key === 'Enter') confirmAction();
  };
  document.addEventListener('keydown', onKey);
  function confirmAction() {
    if (dontShowAgainKey && dsaCheckbox && dsaCheckbox.checked) {
      state.suppressedConfirms[dontShowAgainKey] = true;
    } else if (dontShowAgainKey) {
      // user unchecked — make sure suppression is off
      delete state.suppressedConfirms[dontShowAgainKey];
    }
    dismiss();
    if (onConfirm) onConfirm();
  }
  btnRow.appendChild(makePixelButton({
    label: cancelLabel, accent: C.bg3, small: true,
    onClick: dismiss,
  }));
  btnRow.appendChild(makePixelButton({
    label: confirmLabel, accent: accent || C.red, small: true,
    onClick: confirmAction,
  }));
  modal.appendChild(btnRow);
  overlay.appendChild(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
  document.body.appendChild(overlay);
}

function makeSlider({ label, path, min, max, step = 0.001, accent = C.yellow, format }) {
  const labelEl = el('span', { class: 'slider-label', style: { color: C.dim }}, label);
  const valueEl = el('span', { class: 'slider-value', style: { color: accent }});
  const fill = el('div', { class: 'slider-fill', style: { background: accent }});
  const thumb = el('div', { class: 'slider-thumb', style: { background: accent }});
  const track = el('div', { class: 'slider-track' }, fill, thumb);
  const wrap = el('div', { class: 'slider' },
    el('div', { class: 'slider-header' }, labelEl, valueEl),
    track
  );

  function refresh() {
    const v = getPath(path);
    const pct = clamp((v - min) / (max - min), 0, 1);
    fill.style.width = (pct * 100) + '%';
    thumb.style.left = (pct * 100) + '%';
    valueEl.textContent = format ? format(v) : (typeof v === 'number' ? v.toFixed(2) : v);
  }

  function pointerToValue(e) {
    const rect = track.getBoundingClientRect();
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    const pct = rect.width === 0 ? 0 : x / rect.width;
    let raw = min + pct * (max - min);
    raw = Math.round(raw / step) * step;
    return clamp(raw, min, max);
  }

  let dragging = false;
  track.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    track.setPointerCapture(e.pointerId);
    updatePath(path, pointerToValue(e));
    refresh();
    scheduleScopeRender();
  });
  track.addEventListener('pointermove', e => {
    if (!dragging) return;
    updatePath(path, pointerToValue(e));
    refresh();
    scheduleScopeRender();
  });
  const endDrag = e => {
    if (dragging) {
      dragging = false;
      try { track.releasePointerCapture(e.pointerId); } catch {}
    }
  };
  track.addEventListener('pointerup', endDrag);
  track.addEventListener('pointercancel', endDrag);

  return subscribe({ element: wrap, refresh });
}

function makeToggleGroup({ path, options, accent = C.yellow, transform = v => v, getValue, onChange }) {
  const wrap = el('div', { class: 'toggle-group' });
  const buttons = [];
  options.forEach(opt => {
    const value = typeof opt === 'object' ? opt.value : opt;
    const label = typeof opt === 'object' ? opt.label : opt;
    const btn = el('button', {
      class: 'toggle-btn',
      onclick: () => {
        if (onChange) onChange(value);
        else updatePath(path, transform(value));
        refresh();
        scheduleScopeRender();
      }
    }, label);
    buttons.push({ btn, value });
    wrap.appendChild(btn);
  });
  function refresh() {
    const cur = getValue ? getValue() : getPath(path);
    buttons.forEach(({ btn, value }) => {
      const active = value === cur;
      btn.classList.toggle('active', active);
      btn.style.background = active ? accent : C.bg2;
      btn.style.color = active ? C.ink : C.dim;
      btn.style.borderColor = active ? accent : C.border;
    });
  }
  return subscribe({ element: wrap, refresh });
}

function makePixelButton({ label, icon, accent = C.yellow, onClick, small = false, full = false }) {
  const btn = el('button', {
    class: 'pixel-btn' + (small?' small':'') + (full?' full':''),
    style: { background: accent }
  });
  if (icon) btn.innerHTML = icon;
  btn.appendChild(document.createTextNode(label));
  btn.addEventListener('click', onClick);
  return btn;
}
