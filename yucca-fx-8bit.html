/* ----- ADSR DISPLAY (canvas, pointer-events) ----- */
function makeADSRDisplay() {
  const canvas = el('canvas');
  const wrap = el('div', { class: 'adsr-display' }, canvas);
  const legend = el('div', { class: 'adsr-legend' },
    el('span', { style: { color: C.red }}, '● ATTACK'),
    el('span', { style: { color: C.cyan }}, '● DECAY'),
    el('span', { style: { color: C.green }}, '● SUSTAIN'),
    el('span', { style: { color: C.magenta }}, '● RELEASE'),
  );
  const container = el('div', {}, wrap, legend);

  let drag = null;
  let hover = null;

  function getTotalT() {
    const { attack, decay, release } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    return attack + decay + sustainHold + release;
  }

  function draw() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) return;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;
    const pad = 14, iw = w - pad*2, ih = h - pad*2;

    ctx.fillStyle = C.ink; ctx.fillRect(0,0,w,h);

    ctx.strokeStyle = C.bg3; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i=0; i<=4; i++) { const y = Math.round(pad + (ih*i)/4) + 0.5; ctx.moveTo(pad, y); ctx.lineTo(pad+iw, y); }
    for (let i=0; i<=8; i++) { const x = Math.round(pad + (iw*i)/8) + 0.5; ctx.moveTo(x, pad); ctx.lineTo(x, pad+ih); }
    ctx.stroke();

    const { attack, decay, sustain, release } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    const T = attack + decay + sustainHold + release;
    const tx = t => pad + (t/T)*iw;
    const ty = v => pad + ih - v*ih;

    const pts = [
      { x: tx(0), y: ty(0) },
      { x: tx(attack), y: ty(1), key: 'A' },
      { x: tx(attack+decay), y: ty(sustain), key: 'D' },
      { x: tx(attack+decay+sustainHold), y: ty(sustain), key: 'S' },
      { x: tx(T), y: ty(0), key: 'R' },
    ];

    const grad = ctx.createLinearGradient(0, pad, 0, pad+ih);
    grad.addColorStop(0, 'rgba(255,236,39,0.35)');
    grad.addColorStop(1, 'rgba(255,236,39,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, ty(0));
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, ty(0));
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = C.yellow; ctx.lineWidth = 2; ctx.lineJoin = 'miter';
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();

    const colors = { A: C.red, D: C.cyan, S: C.green, R: C.magenta };
    pts.slice(1).forEach(p => {
      ctx.fillStyle = colors[p.key];
      ctx.fillRect(Math.round(p.x)-5, Math.round(p.y)-5, 10, 10);
      ctx.fillStyle = C.ink;
      ctx.fillRect(Math.round(p.x)-2, Math.round(p.y)-2, 4, 4);
      ctx.fillStyle = colors[p.key];
      ctx.fillRect(Math.round(p.x)-1, Math.round(p.y)-1, 2, 2);
      ctx.font = '10px VT323, monospace';
      ctx.fillStyle = colors[p.key];
      ctx.fillText(p.key, p.x+8, p.y-7);
    });

    if (hover) {
      const p = pts.find(x => x.key === hover);
      if (p) {
        ctx.strokeStyle = colors[hover];
        ctx.lineWidth = 1;
        ctx.strokeRect(p.x-9, p.y-9, 18, 18);
      }
    }
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top, w: r.width, h: r.height };
  }

  function findHit(mx, my, w, h) {
    const pad = 14, iw = w - pad*2, ih = h - pad*2;
    const { attack, decay, sustain } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    const T = getTotalT();
    const pts = [
      { key: 'A', x: pad + (attack/T)*iw, y: pad + ih - 1*ih },
      { key: 'D', x: pad + ((attack+decay)/T)*iw, y: pad + ih - sustain*ih },
      { key: 'S', x: pad + ((attack+decay+sustainHold)/T)*iw, y: pad + ih - sustain*ih },
      { key: 'R', x: pad + iw, y: pad + ih },
    ];
    let best = null, bestDist = 22;
    for (const p of pts) {
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < bestDist) { bestDist = d; best = p.key; }
    }
    return best;
  }

  function moveValue(key, x, y, w, h) {
    const pad = 14, iw = w - pad*2, ih = h - pad*2;
    const { attack, decay, release } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    const T = getTotalT();
    const tNorm = clamp((x - pad)/iw, 0, 1);
    const vNorm = clamp(1 - (y - pad)/ih, 0, 1);
    const tAbs = tNorm * T;

    if (key === 'A') {
      state.patch.amp.attack = clamp(tAbs, 0.001, 1);
    } else if (key === 'D') {
      state.patch.amp.decay = clamp(tAbs - attack, 0.001, 1.5);
      state.patch.amp.sustain = vNorm;
    } else if (key === 'S') {
      state.patch.duration = clamp(tAbs - attack - decay, 0.05, 2);
      state.patch.amp.sustain = vNorm;
    } else if (key === 'R') {
      state.patch.amp.release = clamp(tAbs - attack - decay - sustainHold, 0.001, 2);
    }
    refreshAll();
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const { x, y, w, h } = getPos(e);
    const hit = findHit(x, y, w, h);
    if (hit) {
      drag = hit;
      canvas.setPointerCapture(e.pointerId);
      moveValue(hit, x, y, w, h);
    }
  });
  canvas.addEventListener('pointermove', e => {
    const { x, y, w, h } = getPos(e);
    if (drag) {
      moveValue(drag, x, y, w, h);
    } else {
      const hit = findHit(x, y, w, h);
      if (hit !== hover) { hover = hit; draw(); }
    }
  });
  const release = e => {
    if (drag) {
      drag = null;
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
      draw();
    }
  };
  canvas.addEventListener('pointerup', release);
  canvas.addEventListener('pointercancel', release);
  canvas.addEventListener('pointerleave', () => { hover = null; draw(); });

  window.addEventListener('resize', draw);

  return subscribe({ element: container, refresh: draw });
}

/* ----- WAVEFORM SCOPE ----- */
let scopeTimer = null;
function scheduleScopeRender() {
  if (scopeTimer) clearTimeout(scopeTimer);
  scopeTimer = setTimeout(renderScope, 180);
}

let scopeData = null;
let scopeCanvas = null;

function makeScope() {
  const canvas = el('canvas');
  scopeCanvas = canvas;
  const wrap = el('div', { class: 'scope' }, canvas);
  return wrap;
}

async function renderScope() {
  if (!scopeCanvas) return;
  try {
    const buf = await renderToBuffer(state.patch);
    const data = buf.getChannelData(0);
    const N = 256;
    const out = new Float32Array(N);
    const chunk = Math.max(1, Math.floor(data.length / N));
    for (let i=0; i<N; i++) {
      let peak = 0;
      for (let j=0; j<chunk; j++) {
        const v = data[i*chunk + j] || 0;
        if (Math.abs(v) > Math.abs(peak)) peak = v;
      }
      out[i] = peak;
    }
    scopeData = out;
    drawScope();
  } catch (e) { console.error(e); }
}

function drawScope() {
  const canvas = scopeCanvas;
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width === 0) return;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.fillStyle = C.ink; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = C.bg3; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, h/2 + 0.5); ctx.lineTo(w, h/2 + 0.5); ctx.stroke();
  if (!scopeData) {
    ctx.fillStyle = C.mute; ctx.font = '13px VT323, monospace';
    ctx.fillText('rendering...', 8, h/2 + 4);
    return;
  }
  const N = scopeData.length;
  const barW = w / N;
  ctx.fillStyle = C.green;
  for (let i=0; i<N; i++) {
    const v = scopeData[i];
    const ph = Math.abs(v) * (h * 0.45);
    ctx.fillRect(Math.floor(i*barW), h/2 - ph, Math.max(1, barW - 1), ph * 2);
  }
}

window.addEventListener('resize', drawScope);

/* ===========================================================
   PRESETS (localStorage)
   =========================================================== */
const STORAGE_KEY = 'yuccafx:presets:v1';

function loadPresets() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state.presets = raw ? JSON.parse(raw) : [];
  } catch { state.presets = []; }
}
function savePresets() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.presets)); }
  catch (e) { console.warn('Could not save presets:', e); }
}

  });
  mdNoiseRow.appendChild(mdNoNoise);
  mdNoiseRow.appendChild(mdOnlyNoise);
  mdSec.body.appendChild(mdNoiseRow);

  subscribe({ refresh: () => {
    const md = state.patch.mutantDelay;
    mdToggle.textContent = md.enabled ? 'ON' : 'OFF';
    mdToggle.classList.toggle('on', md.enabled);
    mdNoNoise.classList.toggle('on', !!md.noNoise);
    mdOnlyNoise.classList.toggle('on', !!md.onlyNoise);
  }});
  document.getElementById('mutantSection').appendChild(mdSec.element);

  /* ===== SEQUENCER + LISSAJOUS ===== */
  const seqSec = makeSection('LISSAJOUS SEQUENCER', C.green);
  const seqGrid = el('div', { class: 'seq-grid' });

  // LEFT: Lissajous canvas + ratio sliders
  const lissaWrap = el('div', { class: 'lissajous-wrap' });
  const lissaCanvas = el('canvas', { class: 'lissajous-canvas' });
  lissajous.canvas = lissaCanvas;
  lissaWrap.appendChild(lissaCanvas);
  const ratioGrid = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }});
  ratioGrid.appendChild(makeCustomSlider({
    label:'X RATIO', accent:C.cyan, min:1, max:12, step:0.01,
    getValue: () => lissajous.xRatio,
    setValue: v => lissajous.xRatio = v,
    format: v => v.toFixed(2),
  }).element);
  ratioGrid.appendChild(makeCustomSlider({
    label:'Y RATIO', accent:C.magenta, min:1, max:12, step:0.01,
    getValue: () => lissajous.yRatio,
    setValue: v => lissajous.yRatio = v,
    format: v => v.toFixed(2),
  }).element);
  lissaWrap.appendChild(ratioGrid);
  lissaWrap.appendChild(makeCustomSlider({
    label:'X PHASE', accent:C.yellow, min:0, max:6.283, step:0.01,
    getValue: () => lissajous.xPhase,
    setValue: v => lissajous.xPhase = v,
    format: v => (v/Math.PI).toFixed(2)+'π',
  }).element);
  seqGrid.appendChild(lissaWrap);

  // RIGHT: transport + tracks + variation
  const tracksWrap = el('div', { class: 'seq-tracks' });

  // transport
  const transport = el('div', { class: 'seq-transport' });
  const playSeqBtn = makePixelButton({
    label: 'PLAY', icon: ICONS.play, accent: C.green, small: true,
    onClick: () => {
      if (state.sequencer.playing) stopSequencer();
      else startSequencer();
    }
  });
  transport.appendChild(playSeqBtn);
  const bpmWrap = el('div', { class: 'seq-bpm-wrap' });
  const bpmSlider = makeCustomSlider({
    label:'BPM', accent:C.cyan, min:40, max:240, step:1,
    getValue: () => state.sequencer.bpm,
    setValue: v => state.sequencer.bpm = v,
    format: v => Math.round(v) + '',
  });
  sequencerSubs._bpmUpdate = bpmSlider.refresh;
  bpmWrap.appendChild(bpmSlider.element);
  transport.appendChild(bpmWrap);
  transport.appendChild(makePixelButton({
    label: 'RND SEQ', icon: ICONS.shuffle, accent: C.magenta, small: true,
    onClick: () => {
      state.sequencer.tracks.forEach(t => {
        t.steps = pick([8, 11, 12, 13, 16]);
        t.pulses = Math.max(1, Math.floor(rng(2, t.steps - 1)));
        t.pitchOffset = pick([-12, -7, -5, 0, 0, 5, 7, 12]);
      });
      recomputePatterns();
      state.sequencer.variation.seed = Math.random();
      sequencerSubs.refresh && sequencerSubs.refresh();
      flash('SEQUENCE RANDOMIZED');
    }
  }));
  tracksWrap.appendChild(transport);

  // Track rows
  const trackRowEls = [];
  state.sequencer.tracks.forEach((track, ti) => {
    const row = el('div', { class: 'seq-track' });
    const head = el('div', { class: 'seq-track-head' });
    const tog = el('button', { class: 'seq-track-toggle ' + (track.enabled ? 'on' : 'off') });
    tog.addEventListener('click', () => {
      track.enabled = !track.enabled;
      tog.classList.toggle('on', track.enabled);
      tog.classList.toggle('off', !track.enabled);
    });
    head.appendChild(tog);
    head.appendChild(el('span', { class: 'seq-track-name', style: { color: track.color }}, 'T' + (ti+1)));
    row.appendChild(head);

    const ctrls = el('div', { class: 'seq-track-controls' });
    ctrls.appendChild(makeCustomSlider({
      label:'PULSES', accent:track.color, min:1, max:32, step:1,
      getValue: () => track.pulses,
      setValue: v => track.pulses = Math.min(track.steps, Math.round(v)),
      format: v => Math.round(v) + '',
      onChange: () => { recomputePatterns(); sequencerSubs.refresh && sequencerSubs.refresh(); },
    }).element);
    ctrls.appendChild(makeCustomSlider({
      label:'STEPS', accent:C.cyan, min:2, max:32, step:1,
      getValue: () => track.steps,
      setValue: v => { track.steps = Math.round(v); track.pulses = Math.min(track.pulses, track.steps); },
      format: v => Math.round(v) + '',
      onChange: () => { recomputePatterns(); sequencerSubs.refresh && sequencerSubs.refresh(); },
    }).element);
    ctrls.appendChild(makeCustomSlider({
      label:'PITCH', accent:C.yellow, min:-24, max:24, step:1,
      getValue: () => track.pitchOffset,
      setValue: v => track.pitchOffset = Math.round(v),
      format: v => (v>0?'+':'') + Math.round(v) + 'st',
    }).element);
    row.appendChild(ctrls);

    const stepGrid = el('div', { class: 'seq-step-grid' });
    row.appendChild(stepGrid);

    trackRowEls.push({ row, stepGrid, track });
    tracksWrap.appendChild(row);
  });

  // Variation panel
  const varSec = el('div', { style: { background: C.bg2, border: `2px solid ${C.border}`, padding: '10px', display: 'flex', flexDirection: 'column', gap: '8px', marginTop: '4px' }});
  const varHead = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' }});
  varHead.appendChild(el('span', { class: 'sub-label', style: { color: C.purple }}, '> VARIATION ENGINE'));
  const varToggle = el('button', { class: 'pill-toggle' }, 'OFF');
  varToggle.addEventListener('click', () => {
    state.sequencer.variation.enabled = !state.sequencer.variation.enabled;
    const on = state.sequencer.variation.enabled;
    varToggle.textContent = on ? 'ON' : 'OFF';
    varToggle.classList.toggle('on', on);
  });
  varHead.appendChild(varToggle);
  varSec.appendChild(varHead);

  function vSlider(label, key, min, max, step, accent, format) {
    return makeCustomSlider({
      label, accent, min, max, step, format,
      getValue: () => state.sequencer.variation[key],
      setValue: v => state.sequencer.variation[key] = v,
    });
  }
  const varGrid = el('div', { class: 'var-grid' });
  varGrid.appendChild(vSlider('AMOUNT', 'amount', 0, 1, 0.001, C.purple, v=>Math.round(v*100)+'%').element);
  varGrid.appendChild(vSlider('PITCH DRIFT', 'pitchDrift', 0, 24, 1, C.yellow, v=>'±'+Math.round(v)+'st').element);
  varGrid.appendChild(vSlider('FILTER DRIFT', 'filterDrift', 0, 4, 0.01, C.orange, v=>'±'+v.toFixed(1)+'oct').element);
  varGrid.appendChild(vSlider('DECAY DRIFT', 'decayDrift', 0, 1.5, 0.01, C.magenta, v=>'±'+v.toFixed(2)).element);
  varGrid.appendChild(vSlider('DUTY DRIFT', 'dutyDrift', 0, 1, 0.001, C.cyan, v=>'±'+Math.round(v*100)+'%').element);
  varGrid.appendChild(vSlider('DRIVE DRIFT', 'driveDrift', 0, 1, 0.001, C.red, v=>'±'+Math.round(v*100)+'%').element);
  varGrid.appendChild(vSlider('OSC SWAP', 'oscChance', 0, 1, 0.001, C.green, v=>Math.round(v*100)+'%').element);
  varSec.appendChild(varGrid);

  // OSC SWAP noise-mode mutex toggles
  const varNoiseRow = el('div', { class: 'noise-mode-row' });
  varNoiseRow.appendChild(el('span', { class: 'sub-label', style: { color: C.dim }}, 'OSC SWAP MODE:'));
  const varNoNoise = el('button', { class: 'pill-toggle' }, 'NO NOISE');
  const varOnlyNoise = el('button', { class: 'pill-toggle' }, 'ONLY NOISE');
  function syncVarNoiseButtons() {
    const v = state.sequencer.variation;
    varNoNoise.classList.toggle('on', !!v.noNoise);
    varOnlyNoise.classList.toggle('on', !!v.onlyNoise);
  }
  varNoNoise.addEventListener('click', () => {
    const v = state.sequencer.variation;
    v.noNoise = !v.noNoise;
    if (v.noNoise) v.onlyNoise = false;
    syncVarNoiseButtons();
  });
  varOnlyNoise.addEventListener('click', () => {
    const v = state.sequencer.variation;
    v.onlyNoise = !v.onlyNoise;
    if (v.onlyNoise) v.noNoise = false;
    syncVarNoiseButtons();
  });
  varNoiseRow.appendChild(varNoNoise);
  varNoiseRow.appendChild(varOnlyNoise);
  varSec.appendChild(varNoiseRow);
  syncVarNoiseButtons();

  varSec.appendChild(makePixelButton({
    label: 'RESEED', icon: ICONS.shuffle, accent: C.purple, small: true,
    onClick: () => { state.sequencer.variation.seed = Math.random(); flash('VARIATION RESEEDED'); }
  }));
  tracksWrap.appendChild(varSec);

  seqGrid.appendChild(tracksWrap);
  seqSec.body.appendChild(seqGrid);
  document.getElementById('seqSection').appendChild(seqSec.element);

  // Sequencer refresh: redraws step grids + transport state + bpm
  sequencerSubs.refresh = () => {
    playSeqBtn.lastChild.textContent = state.sequencer.playing ? 'STOP' : 'PLAY';
    playSeqBtn.style.background = state.sequencer.playing ? C.red : C.green;
    if (sequencerSubs._bpmUpdate) sequencerSubs._bpmUpdate();
    trackRowEls.forEach(({ stepGrid, track }, ti) => {
      const pat = track._pattern || euclideanRhythm(track.pulses, track.steps);
      const playhead = state.sequencer.playing ? state.sequencer.step % pat.length : -1;
      if (stepGrid.children.length !== pat.length) {
        stepGrid.innerHTML = '';
        for (let i = 0; i < pat.length; i++) {
          stepGrid.appendChild(el('div', { class: 'seq-step' }));
        }
      }
      Array.from(stepGrid.children).forEach((cell, i) => {
        cell.classList.toggle('on', pat[i] === 1);
        cell.style.background = pat[i] === 1 ? track.color : '';
        cell.classList.toggle('head', i === playhead);
      });
    });
  };
  sequencerSubs.refresh();
  startLissajous();

  const factorySec = makeSection('FACTORY SOUNDS', C.green);
  const factoryGrid = el('div', { class: 'factory-grid' });
  Object.keys(FACTORY).forEach(k => {
    const btn = el('button', {
      class: 'factory-btn',
      onclick: () => { setPatch(FACTORY[k]); flash('LOADED >> ' + k); }
    }, '▶ ' + k);
    factoryGrid.appendChild(btn);
  });
  factorySec.body.appendChild(factoryGrid);
  factoryPopup.appendChild(factorySec.element);

  /* PRESETS */
  const presetSec = makeSection('PRESET BANK', C.cyan);
  const presetCount = el('span', {});
  presetSec.titleEl.textContent = 'PRESET BANK ';
  presetSec.titleEl.appendChild(presetCount);

  const formWrap = el('div', { class: 'preset-form' });
  const nameWrap = el('div', { class: 'preset-name-wrap' });
  nameWrap.appendChild(el('span', { class: 'sub-label' }, 'NAME (8 CHAR MAX)'));
  const nameInput = el('input', { type: 'text', class: 'preset-input', placeholder: 'MYSOUND', maxlength: 8 });
  nameInput.addEventListener('input', () => {
    nameInput.value = nameInput.value.toUpperCase().slice(0, 8);
  });
  nameWrap.appendChild(nameInput);
  formWrap.appendChild(nameWrap);
  formWrap.appendChild(makePixelButton({
    label: 'SAVE', icon: ICONS.save, accent: C.green, small: true,
    onClick: () => {
      const name = (nameInput.value || state.patch.name || 'PRESET').toUpperCase().slice(0, 8);
      const preset = { id: Date.now(), name, patch: { ...JSON.parse(JSON.stringify(state.patch)), name }};
      state.presets = [...state.presets, preset].slice(-24);
      savePresets();
      nameInput.value = '';
      renderPresetGrid();
      flash('SAVED >> ' + name);
    }
  }));
  presetSec.body.appendChild(formWrap);

  const presetGridWrap = el('div');
  presetSec.body.appendChild(presetGridWrap);

  function renderPresetGrid() {
    presetCount.textContent = '[' + state.presets.length + '/24]';
    presetGridWrap.innerHTML = '';
    if (state.presets.length === 0) {
      presetGridWrap.appendChild(el('div', { class: 'preset-empty' }, '< NO PRESETS SAVED >'));
      return;
    }
    const grid = el('div', { class: 'preset-grid' });
    state.presets.forEach(p => {
      const card = el('div', { class: 'preset-card' });
      card.appendChild(el('button', {
        class: 'preset-load',
        onclick: () => { setPatch(p.patch); flash('LOADED >> ' + p.name); }
      }, '◆ ' + p.name));
      card.appendChild(el('button', {
        class: 'preset-del',
        onclick: () => {
          state.presets = state.presets.filter(x => x.id !== p.id);
          savePresets();
          renderPresetGrid();
        }
      }, 'DEL'));
      grid.appendChild(card);
    });
    presetGridWrap.appendChild(grid);
  }
  renderPresetGrid();

  presetsPopup.appendChild(presetSec.element);

  /* EXPORT */
  const exportSec = makeSection('EXPORT', C.yellow);

  // Export option toggles (mono + normalize)
  const exportOptsRow = el('div', { class: 'noise-mode-row', style: { borderTop: 'none', marginTop: '0', paddingTop: '0' }});
  exportOptsRow.appendChild(el('span', { class: 'sub-label', style: { color: C.dim }}, 'EXPORT OPTS:'));
  const monoBtn = el('button', { class: 'pill-toggle' }, 'MONO');
  const normBtn = el('button', { class: 'pill-toggle' }, 'NORMALIZE -6dB');
  function syncExportButtons() {
    monoBtn.classList.toggle('on', !!state.export.mono);
    normBtn.classList.toggle('on', !!state.export.normalize);
  }
  monoBtn.addEventListener('click', () => {
    state.export.mono = !state.export.mono;
    syncExportButtons();
  });
  normBtn.addEventListener('click', () => {
    state.export.normalize = !state.export.normalize;
    syncExportButtons();
  });
  exportOptsRow.appendChild(monoBtn);
  exportOptsRow.appendChild(normBtn);
  exportSec.body.appendChild(exportOptsRow);
  syncExportButtons();

  // Build the renderOpts object from current state.export at export time
  function getExportOpts() {
    return {
      stereo: !state.export.mono,
      normalize: !!state.export.normalize,
      normalizeTarget: state.export.normalizeTarget,
    };
  }

  const exportRow = el('div', { class: 'export-row' });
  let exporting = false;

  const mp3Btn = makePixelButton({
    label: 'EXPORT MP3', icon: ICONS.download, accent: C.yellow, full: true,
    onClick: async () => {
      if (exporting) return;
      exporting = true;
      mp3Btn.disabled = true; wavBtn.disabled = true;
      mp3Btn.lastChild.textContent = 'RENDERING...';
      errorEl.style.display = 'none';
      try {
        const blob = await exportMp3(state.patch, getExportOpts());
        downloadBlob(blob, (state.patch.name || 'sfx') + '.mp3');
        flash('MP3 EXPORTED');
      } catch (e) {
        console.error(e);
        errorEl.textContent = '! MP3 encoder failed to load (check connection). Try WAV.';
        errorEl.style.display = '';
      }
      exporting = false;
      mp3Btn.disabled = false; wavBtn.disabled = false;
      mp3Btn.lastChild.textContent = 'EXPORT MP3';
    }
  });

  const wavBtn = makePixelButton({
    label: 'EXPORT WAV', icon: ICONS.download, accent: C.cyan, full: true,
    onClick: async () => {
      if (exporting) return;
      exporting = true;
      mp3Btn.disabled = true; wavBtn.disabled = true;
      try {
        const buf = await renderToBuffer(state.patch, getExportOpts());
        const blob = bufferToWav(buf);
        downloadBlob(blob, (state.patch.name || 'sfx') + '.wav');
        flash('WAV EXPORTED');
      } catch (e) {
        console.error(e);
        errorEl.textContent = '! Render failed.';
        errorEl.style.display = '';
      }
      exporting = false;
      mp3Btn.disabled = false; wavBtn.disabled = false;
    }
  });

  exportRow.appendChild(mp3Btn);
  exportRow.appendChild(wavBtn);
  exportSec.body.appendChild(exportRow);

  const errorEl = el('div', { class: 'export-error', style: { display: 'none' }});
  exportSec.body.appendChild(errorEl);

  exportSec.body.appendChild(el('div', { class: 'export-note' },
    'MP3 LOADS LAMEJS FROM CDN ON FIRST USE · WAV ALWAYS WORKS OFFLINE'));

  exportPopup.appendChild(exportSec.element);

  /* Init */
  loadPresets();
  renderPresetGrid();

  // load patch from URL hash if present
  if (window.location.hash) {
    const p = hashToPatch(window.location.hash.slice(1));
    if (p) {
      state.patch = p;
      flash('PATCH LOADED FROM URL');
    }
  }

  refreshAll();
  // initial scope render
  setTimeout(renderScope, 100);
}

/* Hotkeys */
document.addEventListener('keydown', e => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.code === 'Space') { e.preventDefault(); playSound(); }
  else if (e.key === 'r' || e.key === 'R') { setPatch(randomPatch()); flash('RANDOMIZED'); }
});

/* Boot */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', build);
} else {
  build();
}
</script>
</body>
</html>
