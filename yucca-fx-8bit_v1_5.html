function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'style') Object.assign(e.style, props[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === 'html') e.innerHTML = props[k];
    else e.setAttribute(k, props[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

// Custom slider for values that don't live on state.patch (lissajous, sequencer, etc).
// Doesn't subscribe to refreshAll, so safe for non-patch state.
// A reusable pill toggle for boolean state, optionally subscribing to refresh
function makeBoolPill(label, getValue, setValue, opts) {
  const pill = el('button', { class: 'pill-toggle' }, label);
  function sync() { pill.classList.toggle('on', !!getValue()); }
  pill.addEventListener('click', (e) => {
    e.stopPropagation();
    setValue(!getValue());
    sync();
    if (opts && opts.onChange) opts.onChange();
  });
  sync();
  subscribe({ refresh: sync });
  return pill;
}

function makeCustomSlider({ label, getValue, setValue, min, max, step = 0.01, accent = C.yellow, format, onChange }) {
  const labelEl = el('span', { class: 'slider-label', style: { color: C.dim }}, label);
  const valueEl = el('span', { class: 'slider-value', style: { color: accent }});
  const fill = el('div', { class: 'slider-fill', style: { background: accent }});
  const thumb = el('div', { class: 'slider-thumb', style: { background: accent }});
  const trackEl = el('div', { class: 'slider-track' }, fill, thumb);
  const wrap = el('div', { class: 'slider' },
    el('div', { class: 'slider-header' }, labelEl, valueEl),
    trackEl
  );
  function update() {
    const v = getValue();
    const pct = clamp((v - min) / (max - min), 0, 1);
    fill.style.width = (pct * 100) + '%';
    thumb.style.left = (pct * 100) + '%';
    valueEl.textContent = format ? format(v) : v.toFixed(2);
  }
  function ptv(e) {
    const rect = trackEl.getBoundingClientRect();
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    const pct = rect.width === 0 ? 0 : x / rect.width;
    let raw = min + pct * (max - min);
    raw = Math.round(raw / step) * step;
    setValue(clamp(raw, min, max));
    update();
    if (onChange) onChange();
  }
  let dragging = false;
  trackEl.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    trackEl.setPointerCapture(e.pointerId);
    ptv(e);
  });
  trackEl.addEventListener('pointermove', e => { if (dragging) ptv(e); });
  const end = e => {
    if (dragging) {
      dragging = false;
      try { trackEl.releasePointerCapture(e.pointerId); } catch {}
    }
  };
  trackEl.addEventListener('pointerup', end);
  trackEl.addEventListener('pointercancel', end);
  update();
  return { element: wrap, refresh: update };
}

function makeSection(title, accentColor, options) {
  const opts = options || {};
  const dot = el('div', { class: 'section-dot', style: { background: accentColor }});
  const titleEl = el('span', { class: 'section-title', style: { color: accentColor }}, title);
  const head = el('div', { class: 'section-head section-head-clickable' }, dot, titleEl);

  // Optional ON/OFF pill — placed before the chevron, with its own click handler
  let toggleEl = null;
  if (opts.onOff) {
    toggleEl = el('button', { class: 'section-toggle' }, 'OFF');
    tip(toggleEl, 'Toggle ' + title + ' on/off  ·  preserves your settings while bypassed');
    function syncToggle() {
      const on = !!opts.onOff.isOn();
      toggleEl.textContent = on ? 'ON' : 'OFF';
      toggleEl.classList.toggle('on', on);
    }
    toggleEl.addEventListener('click', e => {
      e.stopPropagation(); // don't bubble to the head's collapse handler
      const on = !!opts.onOff.isOn();
      opts.onOff.setOn(!on);
      syncToggle();
    });
    head.appendChild(toggleEl);
    syncToggle();
    subscribe({ refresh: syncToggle });
  }

  const chevron = el('span', { class: 'section-chevron', style: { color: accentColor }}, '▾');
  head.appendChild(chevron);

  const content = el('div', { class: 'section-content' });
  const wrap = el('div', { class: 'section', style: { gap: '10px' }}, head, content);

  let collapsed = !!opts.startCollapsed;
  function applyState() {
    content.style.display = collapsed ? 'none' : '';
    chevron.textContent = collapsed ? '▸' : '▾';
    wrap.classList.toggle('collapsed', collapsed);
  }
  applyState();
  head.addEventListener('click', (e) => {
    if (e.target.closest('input, button, .slider-track, .section-toggle')) return;
    collapsed = !collapsed;
    applyState();
  });

  return { element: wrap, body: content, titleEl, head, chevron, toggleEl };
}

/* ===== Filter response visualizer ===== */
function makeFilterViz() {
  const canvas = el('canvas', { class: 'filter-viz' });
  let raf = null;
  function draw() {
    raf = null;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) return;
    if (canvas.width !== Math.floor(rect.width * dpr) || canvas.height !== Math.floor(rect.height * dpr)) {
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
    }
    const c = canvas.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;
    c.fillStyle = C.ink;
    c.fillRect(0, 0, w, h);

    // Compute response via a throwaway BiquadFilterNode
    const ac = ensureCtx();
    const f = ac.createBiquadFilter();
    f.type = state.patch.filter.type;
    f.frequency.value = state.patch.filter.cutoff;
    f.Q.value = state.patch.filter.resonance;
    const N = Math.max(80, Math.floor(w));
    const minLog = Math.log(20), maxLog = Math.log(20000);
    const freqArr = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      freqArr[i] = Math.exp(minLog + (i / (N - 1)) * (maxLog - minLog));
    }
    const magArr = new Float32Array(N);
    const phaseArr = new Float32Array(N);
    f.getFrequencyResponse(freqArr, magArr, phaseArr);

    // dB axis: -36..+18
    const minDb = -36, maxDb = 18;
    const dbToY = db => h - ((db - minDb) / (maxDb - minDb)) * h;
    const fToX = freq => ((Math.log(freq) - minLog) / (maxLog - minLog)) * w;

    // Grid: 0dB line + decade marks
    c.strokeStyle = C.bg3;
    c.lineWidth = 1;
    [100, 1000, 10000].forEach(freq => {
      const x = fToX(freq);
      c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke();
    });
    c.beginPath(); c.moveTo(0, dbToY(0)); c.lineTo(w, dbToY(0)); c.stroke();

    // Cutoff vertical
    const cutX = fToX(state.patch.filter.cutoff);
    c.strokeStyle = C.dim;
    c.setLineDash([3, 3]);
    c.beginPath(); c.moveTo(cutX, 0); c.lineTo(cutX, h); c.stroke();
    c.setLineDash([]);

    // Response curve, color by filter type
    const filterColor = ({
      lowpass: C.cyan, highpass: C.orange, bandpass: C.magenta,
      notch: C.purple, peaking: C.yellow, lowshelf: C.green, highshelf: C.green, allpass: C.red,
    })[state.patch.filter.type] || C.cyan;
    c.strokeStyle = filterColor;
    c.lineWidth = 2;
    c.shadowColor = filterColor;
    c.shadowBlur = 4;
    c.beginPath();
    for (let i = 0; i < N; i++) {
      const x = (i / (N - 1)) * w;
      const db = 20 * Math.log10(Math.max(0.0001, magArr[i]));
      const y = dbToY(clamp(db, minDb, maxDb));
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
    }
    c.stroke();
    c.shadowBlur = 0;

    // Cutoff label
    c.fillStyle = C.dim;
    c.font = '8px ' + 'monospace';
    const cutoff = state.patch.filter.cutoff;
    const cutLabel = cutoff >= 1000 ? (cutoff / 1000).toFixed(1) + 'k' : Math.round(cutoff) + 'Hz';
    c.fillText(cutLabel, Math.min(cutX + 4, w - 30), 11);
    c.fillStyle = C.bg3;
    c.fillText('20Hz', 2, h - 3);
    c.fillText('20kHz', w - 28, h - 3);
  }
  function scheduleDraw() {
    if (raf) return;
    raf = requestAnimationFrame(draw);
  }
  return { element: canvas, draw: scheduleDraw };
}

/* ===== Dropdown menu ===== */
function makeDropdown(triggerLabel, accentColor, contentBuilder) {
  const wrap = el('div', { class: 'menu-wrap' });
  const trigger = el('button', { class: 'menu-btn', style: { color: accentColor }});
  trigger.appendChild(el('span', {}, triggerLabel));
  trigger.appendChild(el('span', { class: 'menu-chevron' }, '▾'));
  const popup = el('div', { class: 'menu-popup hidden' });
  contentBuilder(popup);
  popup.addEventListener('click', e => e.stopPropagation());
  wrap.appendChild(trigger);
  // popup is appended to body so it floats free of any overflow/sticky parent
  document.body.appendChild(popup);

  function positionPopup() {
    const tr = trigger.getBoundingClientRect();
    const margin = 8;
    const vw = window.innerWidth, vh = window.innerHeight;
    // measure naturally first by placing flush at trigger.left
    popup.style.top = (tr.bottom + 4) + 'px';
    popup.style.left = tr.left + 'px';
    popup.style.right = 'auto';
    // now check overflow
    const pr = popup.getBoundingClientRect();
    if (pr.right > vw - margin) {
      // anchor to right side instead
      popup.style.left = 'auto';
      popup.style.right = (vw - tr.right) + 'px';
      // re-check left bound
      const pr2 = popup.getBoundingClientRect();
      if (pr2.left < margin) {
        // popup wider than possible — pin to viewport with side margins
        popup.style.left = margin + 'px';
        popup.style.right = margin + 'px';
        popup.style.width = (vw - margin*2) + 'px';
      }
    }
    // clamp height: ensure popup fits between top and bottom of viewport
    const maxH = Math.max(160, vh - tr.bottom - 16);
    popup.style.maxHeight = maxH + 'px';
  }

  function close() {
    popup.classList.add('hidden');
    trigger.classList.remove('open');
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = !popup.classList.contains('hidden');
    document.querySelectorAll('.menu-popup:not(.hidden)').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
    if (!isOpen) {
      popup.classList.remove('hidden');
      trigger.classList.add('open');
      positionPopup();
    }
  });
  // reposition on viewport changes while open
  window.addEventListener('resize', () => {
    if (!popup.classList.contains('hidden')) positionPopup();
  });
  window.addEventListener('scroll', () => {
    if (!popup.classList.contains('hidden')) positionPopup();
  }, true);

  return { element: wrap, trigger, popup, close };
}

/* Global click-away + ESC closes dropdowns and modals */
document.addEventListener('click', () => {
  document.querySelectorAll('.menu-popup:not(.hidden)').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.menu-popup:not(.hidden)').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
  }
});

/* ===== Confirm modal ===== */
// Optional `dontShowAgainKey` (string) ties this confirm to state.suppressedConfirms[key].
// First time: shows modal with a checkbox CHECKED by default. If user confirms with the box
// still checked, future calls with the same key skip the modal. If they uncheck before confirming,
// the suppression is lifted (popup will show next time too).
/* ===== Info modal — single dismiss button, supports rich HTML body ===== */
// Use this for things that need explanation, not confirmation.
// `bodyHtml` may contain trusted HTML (we never pass user-supplied content here).
function showInfoModal({ title, bodyHtml, accent, dismissLabel = 'GOT IT' }) {
  const overlay = el('div', { class: 'modal-overlay' });
  const modal = el('div', { class: 'modal modal-info' });
  modal.appendChild(el('div', { class: 'modal-title', style: { color: accent || C.cyan }}, title));
  const body = el('div', { class: 'modal-info-body' });
  body.innerHTML = bodyHtml;
  modal.appendChild(body);
  function dismiss() {
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  }
  const onKey = e => { if (e.key === 'Escape' || e.key === 'Enter') dismiss(); };
  document.addEventListener('keydown', onKey);
  const btnRow = el('div', { class: 'modal-buttons' });
  btnRow.appendChild(makePixelButton({
    label: dismissLabel, accent: accent || C.cyan, small: true, onClick: dismiss,
  }));
  modal.appendChild(btnRow);
  overlay.appendChild(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
  document.body.appendChild(overlay);
}

/* Sequencer help modal — content + invocation in one place so both
 * the markup and the styling assumptions stay synced.
 */
function showSequencerHelp() {
  showInfoModal({
    title: '> LISSAJOUS SEQUENCER · QUICK GUIDE',
    accent: C.green,
    bodyHtml: `
      <h4>What it does</h4>
      <p>Three independent <em>euclidean rhythm</em> tracks trigger your current patch in evenly-spaced patterns. Each track can pitch the patch up or down, and an optional <em>variation engine</em> mutates each hit so loops never feel repetitive.</p>

      <h4>Tracks <strong>T1 / T2 / T3</strong></h4>
      <ul>
        <li><strong>Toggle</strong> · the colored square enables/disables the track.</li>
        <li><strong>PULSES</strong> · how many hits per pattern.</li>
        <li><strong>STEPS</strong> · pattern length. Pulses get distributed as evenly as possible — this is what makes euclidean rhythms groove.</li>
        <li><strong>PITCH</strong> · semitone offset from your patch's note.</li>
      </ul>
      <p>Try <code>5 in 16</code> for a clave, <code>3 in 8</code> for tresillo, <code>7 in 12</code> for a polyrhythm. Mix coprime step counts (16+11+13) for patterns that take ~30+ seconds to repeat.</p>

      <h4>Lissajous visualizer</h4>
      <p>The XY oscilloscope on the left draws the relationship between two sine waves at the chosen <strong>X RATIO</strong> / <strong>Y RATIO</strong>. The shape flashes the color of whichever track just fired. Pure pythagorean ratios (3:2, 5:4) close into stable shapes; irrational ratios drift forever.</p>

      <h4>Transport</h4>
      <ul>
        <li><strong>PLAY / STOP</strong> · starts the engine.</li>
        <li><strong>BPM</strong> · 40–240. Steps are 16th notes.</li>
        <li><strong>RND SEQ</strong> · randomizes all three tracks' pulses, steps, and pitch offsets.</li>
      </ul>

      <h4>Variation engine</h4>
      <p>When ON, every hit gets a deterministic per-step mutation seeded by the current pattern. <em>Same pattern, same variations</em> — it grooves rather than flickering. The drift sliders control how far each parameter can wander. <strong>RESEED</strong> rolls a new variation pattern.</p>
      <ul>
        <li><strong>NO NOISE</strong> · OSC SWAP picks pulse / triangle / sawtooth only.</li>
        <li><strong>ONLY NOISE</strong> · forces every hit to noise, randomizes the noise type.</li>
      </ul>

      <h4>Recording loops</h4>
      <p>The <strong>REC LOOP</strong> row at the bottom renders <code>N</code> cycles of your current sequence to a WAV or MP3 file. The system picks a loop length that's the LCM of all active tracks' steps — so the file loops cleanly when you concatenate it. Cap is 64 sixteenths × 8 cycles.</p>

      <h4>Tips</h4>
      <ul>
        <li>Set up a chord progression by setting different <strong>PITCH</strong> offsets on each track over different step counts.</li>
        <li>For drum loops, build three patches (kick / snare / hat), save them as presets, and trigger them by enabling one track per preset hit.</li>
        <li>Variation + Mutant Delay together = endless evolving patterns from a single patch.</li>
      </ul>
    `,
  });
}

function showConfirm({ title, message, confirmLabel = 'CONFIRM', cancelLabel = 'CANCEL', accent, onConfirm, dontShowAgainKey, dontShowAgainLabel }) {
  if (dontShowAgainKey && state.suppressedConfirms[dontShowAgainKey]) {
    if (onConfirm) onConfirm();
    return;
  }
  const overlay = el('div', { class: 'modal-overlay' });
  const modal = el('div', { class: 'modal' });
  modal.appendChild(el('div', { class: 'modal-title', style: { color: accent || C.red }}, title));
  modal.appendChild(el('div', { class: 'modal-message' }, message));

  // Optional "don't show again" checkbox — defaults to CHECKED so a single confirm flow
  // suppresses future popups; user can uncheck to keep the popup armed
  let dsaCheckbox = null;
  if (dontShowAgainKey) {
    const wrap = el('label', { class: 'modal-dsa' });
    dsaCheckbox = el('input', { type: 'checkbox' });
    dsaCheckbox.checked = true; // default checked
    wrap.appendChild(dsaCheckbox);
    wrap.appendChild(el('span', {}, dontShowAgainLabel || "DON'T SHOW AGAIN THIS SESSION"));
    modal.appendChild(wrap);
  }

  const btnRow = el('div', { class: 'modal-buttons' });
  function dismiss() {
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  }
  const onKey = e => {
    if (e.key === 'Escape') dismiss();
    else if (e.key === 'Enter') confirmAction();
  };
  document.addEventListener('keydown', onKey);
  function confirmAction() {
    if (dontShowAgainKey && dsaCheckbox && dsaCheckbox.checked) {
      state.suppressedConfirms[dontShowAgainKey] = true;
    } else if (dontShowAgainKey) {
      // user unchecked — make sure suppression is off
      delete state.suppressedConfirms[dontShowAgainKey];
    }
    dismiss();
    if (onConfirm) onConfirm();
  }
  btnRow.appendChild(makePixelButton({
    label: cancelLabel, accent: C.bg3, small: true,
    onClick: dismiss,
  }));
  btnRow.appendChild(makePixelButton({
    label: confirmLabel, accent: accent || C.red, small: true,
    onClick: confirmAction,
  }));
  modal.appendChild(btnRow);
  overlay.appendChild(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
  document.body.appendChild(overlay);
}

function makeSlider({ label, path, min, max, step = 0.001, accent = C.yellow, format }) {
  const labelEl = el('span', { class: 'slider-label', style: { color: C.dim }}, label);
  const valueEl = el('span', { class: 'slider-value', style: { color: accent }});
  const fill = el('div', { class: 'slider-fill', style: { background: accent }});
  const thumb = el('div', { class: 'slider-thumb', style: { background: accent }});
  const track = el('div', { class: 'slider-track' }, fill, thumb);
  const wrap = el('div', { class: 'slider' },
    el('div', { class: 'slider-header' }, labelEl, valueEl),
    track
  );

  function refresh() {
    const v = getPath(path);
    const pct = clamp((v - min) / (max - min), 0, 1);
    fill.style.width = (pct * 100) + '%';
    thumb.style.left = (pct * 100) + '%';
    valueEl.textContent = format ? format(v) : (typeof v === 'number' ? v.toFixed(2) : v);
  }

  function pointerToValue(e) {
    const rect = track.getBoundingClientRect();
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    const pct = rect.width === 0 ? 0 : x / rect.width;
    let raw = min + pct * (max - min);
    raw = Math.round(raw / step) * step;
    return clamp(raw, min, max);
  }

  let dragging = false;
  track.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    track.setPointerCapture(e.pointerId);
    updatePath(path, pointerToValue(e));
    refresh();
    scheduleScopeRender();
  });
  track.addEventListener('pointermove', e => {
    if (!dragging) return;
    updatePath(path, pointerToValue(e));
    refresh();
    scheduleScopeRender();
  });
  const endDrag = e => {
    if (dragging) {
      dragging = false;
      try { track.releasePointerCapture(e.pointerId); } catch {}
    }
  };
  track.addEventListener('pointerup', endDrag);
  track.addEventListener('pointercancel', endDrag);

  return subscribe({ element: wrap, refresh });
}

function makeToggleGroup({ path, options, accent = C.yellow, transform = v => v, getValue, onChange }) {
  const wrap = el('div', { class: 'toggle-group' });
  const buttons = [];
  options.forEach(opt => {
    const value = typeof opt === 'object' ? opt.value : opt;
    const label = typeof opt === 'object' ? opt.label : opt;
    const btn = el('button', {
      class: 'toggle-btn',
      onclick: () => {
        if (onChange) onChange(value);
        else updatePath(path, transform(value));
        refresh();
        scheduleScopeRender();
      }
    }, label);
    buttons.push({ btn, value });
    wrap.appendChild(btn);
  });
  function refresh() {
    const cur = getValue ? getValue() : getPath(path);
    buttons.forEach(({ btn, value }) => {
      const active = value === cur;
      btn.classList.toggle('active', active);
      btn.style.background = active ? accent : C.bg2;
      btn.style.color = active ? C.ink : C.dim;
      btn.style.borderColor = active ? accent : C.border;
    });
  }
  return subscribe({ element: wrap, refresh });
}

// Convert a hex color to its perceptual brightness 0..255 so we can
// pick a readable text color (light text on dark bg, dark on light)
function _brightness(hex) {
  if (!hex || hex[0] !== '#') return 128;
  const h = hex.length === 4
    ? '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3]
    : hex;
  const r = parseInt(h.slice(1, 3), 16);
  const g = parseInt(h.slice(3, 5), 16);
  const b = parseInt(h.slice(5, 7), 16);
  // ITU-R BT.601 luma (matches what humans actually perceive)
  return 0.299 * r + 0.587 * g + 0.114 * b;
}
function _readableTextOn(bg) {
  return _brightness(bg) > 140 ? C.ink : C.text;
}

function makePixelButton({ label, icon, accent = C.yellow, onClick, small = false, full = false, half = false }) {
  const btn = el('button', {
    class: 'pixel-btn' + (small?' small':'') + (full?' full':'') + (half?' half':''),
    style: { background: accent, color: _readableTextOn(accent) }
  });
  if (icon) btn.innerHTML = icon;
  btn.appendChild(document.createTextNode(label));
  btn.addEventListener('click', onClick);
  return btn;
}

/* ----- ADSR DISPLAY (canvas, pointer-events) ----- */
function makeADSRDisplay() {
  const canvas = el('canvas');
  const wrap = el('div', { class: 'adsr-display' }, canvas);
  const legend = el('div', { class: 'adsr-legend' },
    el('span', { style: { color: C.red }}, '● ATTACK'),
    el('span', { style: { color: C.cyan }}, '● DECAY'),
    el('span', { style: { color: C.green }}, '● SUSTAIN'),
    el('span', { style: { color: C.magenta }}, '● RELEASE'),
  );
  const container = el('div', {}, wrap, legend);

  let drag = null;
  let hover = null;

  function getTotalT() {
    const { attack, decay, release } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    return attack + decay + sustainHold + release;
  }

  function draw() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) return;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;
    const pad = 14, iw = w - pad*2, ih = h - pad*2;

    ctx.fillStyle = C.ink; ctx.fillRect(0,0,w,h);

    ctx.strokeStyle = C.bg3; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i=0; i<=4; i++) { const y = Math.round(pad + (ih*i)/4) + 0.5; ctx.moveTo(pad, y); ctx.lineTo(pad+iw, y); }
    for (let i=0; i<=8; i++) { const x = Math.round(pad + (iw*i)/8) + 0.5; ctx.moveTo(x, pad); ctx.lineTo(x, pad+ih); }
    ctx.stroke();

    const { attack, decay, sustain, release } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    const T = attack + decay + sustainHold + release;
    const tx = t => pad + (t/T)*iw;
    const ty = v => pad + ih - v*ih;

    const pts = [
      { x: tx(0), y: ty(0) },
      { x: tx(attack), y: ty(1), key: 'A' },
      { x: tx(attack+decay), y: ty(sustain), key: 'D' },
      { x: tx(attack+decay+sustainHold), y: ty(sustain), key: 'S' },
      { x: tx(T), y: ty(0), key: 'R' },
    ];

    const grad = ctx.createLinearGradient(0, pad, 0, pad+ih);
    grad.addColorStop(0, 'rgba(255,236,39,0.35)');
    grad.addColorStop(1, 'rgba(255,236,39,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, ty(0));
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, ty(0));
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = C.yellow; ctx.lineWidth = 2; ctx.lineJoin = 'miter';
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();

    const colors = { A: C.red, D: C.cyan, S: C.green, R: C.magenta };
    pts.slice(1).forEach(p => {
      ctx.fillStyle = colors[p.key];
      ctx.fillRect(Math.round(p.x)-5, Math.round(p.y)-5, 10, 10);
      ctx.fillStyle = C.ink;
      ctx.fillRect(Math.round(p.x)-2, Math.round(p.y)-2, 4, 4);
      ctx.fillStyle = colors[p.key];
      ctx.fillRect(Math.round(p.x)-1, Math.round(p.y)-1, 2, 2);
      ctx.font = '10px VT323, monospace';
      ctx.fillStyle = colors[p.key];
      ctx.fillText(p.key, p.x+8, p.y-7);
    });

    if (hover) {
      const p = pts.find(x => x.key === hover);
      if (p) {
        ctx.strokeStyle = colors[hover];
        ctx.lineWidth = 1;
        ctx.strokeRect(p.x-9, p.y-9, 18, 18);
      }
    }
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top, w: r.width, h: r.height };
  }

  function findHit(mx, my, w, h) {
    const pad = 14, iw = w - pad*2, ih = h - pad*2;
    const { attack, decay, sustain } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    const T = getTotalT();
    const pts = [
      { key: 'A', x: pad + (attack/T)*iw, y: pad + ih - 1*ih },
      { key: 'D', x: pad + ((attack+decay)/T)*iw, y: pad + ih - sustain*ih },
      { key: 'S', x: pad + ((attack+decay+sustainHold)/T)*iw, y: pad + ih - sustain*ih },
      { key: 'R', x: pad + iw, y: pad + ih },
    ];
    let best = null, bestDist = 22;
    for (const p of pts) {
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < bestDist) { bestDist = d; best = p.key; }
    }
    return best;
  }

  function moveValue(key, x, y, w, h) {
    const pad = 14, iw = w - pad*2, ih = h - pad*2;
    const { attack, decay, release } = state.patch.amp;
    const sustainHold = Math.max(0.05, state.patch.duration);
    const T = getTotalT();
    const tNorm = clamp((x - pad)/iw, 0, 1);
    const vNorm = clamp(1 - (y - pad)/ih, 0, 1);
    const tAbs = tNorm * T;

    if (key === 'A') {
      state.patch.amp.attack = clamp(tAbs, 0.001, 1);
    } else if (key === 'D') {
      state.patch.amp.decay = clamp(tAbs - attack, 0.001, 1.5);
      state.patch.amp.sustain = vNorm;
    } else if (key === 'S') {
      state.patch.duration = clamp(tAbs - attack - decay, 0.05, 2);
      state.patch.amp.sustain = vNorm;
    } else if (key === 'R') {
      state.patch.amp.release = clamp(tAbs - attack - decay - sustainHold, 0.001, 2);
    }
    refreshAll();
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const { x, y, w, h } = getPos(e);
    const hit = findHit(x, y, w, h);
    if (hit) {
      drag = hit;
      canvas.setPointerCapture(e.pointerId);
      moveValue(hit, x, y, w, h);
    }
  });
  canvas.addEventListener('pointermove', e => {
    const { x, y, w, h } = getPos(e);
    if (drag) {
      moveValue(drag, x, y, w, h);
    } else {
      const hit = findHit(x, y, w, h);
      if (hit !== hover) { hover = hit; draw(); }
    }
  });
  const release = e => {
    if (drag) {
      drag = null;
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
      draw();
    }
  };
  canvas.addEventListener('pointerup', release);
  canvas.addEventListener('pointercancel', release);
  canvas.addEventListener('pointerleave', () => { hover = null; draw(); });

  window.addEventListener('resize', draw);

  return subscribe({ element: container, refresh: draw });
}

/* ----- WAVEFORM SCOPE ----- */
let scopeTimer = null;
function scheduleScopeRender() {
  if (scopeTimer) clearTimeout(scopeTimer);
  scopeTimer = setTimeout(renderScope, 180);
}

let scopeData = null;
let scopeCanvas = null;

function makeScope() {
  const canvas = el('canvas');
  scopeCanvas = canvas;
  const wrap = el('div', { class: 'scope' }, canvas);
  return wrap;
}

async function renderScope() {
  if (!scopeCanvas) return;
  try {
    const buf = await renderToBuffer(state.patch);
    const data = buf.getChannelData(0);
    const N = 256;
    const out = new Float32Array(N);
    const chunk = Math.max(1, Math.floor(data.length / N));
    for (let i=0; i<N; i++) {
      let peak = 0;
      for (let j=0; j<chunk; j++) {
        const v = data[i*chunk + j] || 0;
        if (Math.abs(v) > Math.abs(peak)) peak = v;
      }
      out[i] = peak;
    }
    scopeData = out;
    drawScope();
  } catch (e) { console.error(e); }
}

function drawScope() {
  const canvas = scopeCanvas;
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width === 0) return;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.fillStyle = C.ink; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = C.bg3; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, h/2 + 0.5); ctx.lineTo(w, h/2 + 0.5); ctx.stroke();
  if (!scopeData) {
    ctx.fillStyle = C.mute; ctx.font = '13px VT323, monospace';
    ctx.fillText('rendering...', 8, h/2 + 4);
    return;
  }
  const N = scopeData.length;
  const barW = w / N;
  ctx.fillStyle = C.green;
  for (let i=0; i<N; i++) {
    const v = scopeData[i];
    const ph = Math.abs(v) * (h * 0.45);
    ctx.fillRect(Math.floor(i*barW), h/2 - ph, Math.max(1, barW - 1), ph * 2);
  }
}

window.addEventListener('resize', drawScope);

const STORAGE_KEY = 'yuccafx:presets:v1';

function loadPresets() {

    state.presets = raw ? JSON.parse(raw) : [];
  } catch { state.presets = []; }
}

  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.presets)); }
  catch (e) { console.warn('Could not save presets:', e); }
}

// Queue persistence — saved as patches+names only, no transient export state
function loadQueue() {
  try {
    const raw = localStorage.getItem(QUEUE_STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) state.export.queue = parsed.slice(0, QUEUE_MAX);
  } catch { /* ignore */ }
}
function saveQueue() {
  try { localStorage.setItem(QUEUE_STORAGE_KEY, JSON.stringify(state.export.queue)); }
  catch (e) { console.warn('Could not save queue:', e); }
}

// Current-patch autosave — debounced because it fires on every slider drag.
// Saves the patch + sequencer snapshot together so leaving the page mid-edit
// restores the exact working state on next visit.
let _autosaveTimer = null;
function scheduleAutosave() {
  if (_autosaveTimer) return;
  _autosaveTimer = setTimeout(() => {
    _autosaveTimer = null;
    try {
      const blob = {
        patch: state.patch,
        sequencer: (typeof snapshotSequencer === 'function') ? snapshotSequencer() : null,
        savedAt: Date.now(),
      };
      localStorage.setItem(PATCH_STORAGE_KEY, JSON.stringify(blob));
    } catch (e) { /* quota exceeded etc. — not fatal */ }
  }, 400);
}
function loadAutosave() {
  try {
    const raw = localStorage.getItem(PATCH_STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

    if (empty) return;
    state.export.queue.forEach((item, i) => {
      const row = el('div', { class: 'queue-item' });
      row.appendChild(el('span', { class: 'queue-item-num' }, String(i + 1).padStart(2, '0')));
      const nameInput = el('input', { type: 'text', class: 'queue-item-name', value: item.name });
      nameInput.addEventListener('input', e => { item.name = e.target.value; saveQueue(); });
      row.appendChild(nameInput);
      const removeBtn = el('button', { class: 'queue-item-remove', title: 'Remove' }, '×');
      removeBtn.addEventListener('click', () => {
        state.export.queue.splice(i, 1);
        saveQueue();
        renderQueueList();
      });
      row.appendChild(removeBtn);
      queueList.appendChild(row);
    });
  }
  // Expose so the global addCurrentToQueue can refresh the UI
  state._queueRefresh = renderQueueList;

  let batchExporting = false;
  async function batchExport(format, asZip) {
    if (batchExporting || state.export.queue.length === 0) return;
    batchExporting = true;
    queueAddBtn.disabled = true; batchWavBtn.disabled = true;
    batchMp3Btn.disabled = true; zipWavBtn.disabled = true; zipMp3Btn.disabled = true;
    queueClearBtn.disabled = true;
    queueProgress.style.display = '';
    errorEl.style.display = 'none';
    const zipFiles = [];
    const total = state.export.queue.length;
    try {
      for (let i = 0; i < total; i++) {
        const item = state.export.queue[i];
        queueProgressText.textContent = 'RENDERING ' + (i + 1) + ' OF ' + total + ' · ' + item.name;
        queueProgressFill.style.width = ((i / total) * 100) + '%';
        // yield to the UI thread before the heavy work
        await new Promise(r => setTimeout(r, 10));
        const buf = await renderToBuffer(item.patch, getExportOpts());
        const blob = format === 'mp3' ? await bufferToMp3(buf) : bufferToWav(buf);
        const fileName = sanitizeFilename(item.name) + '.' + format;
        if (asZip) {
          const bytes = new Uint8Array(await blob.arrayBuffer());
          zipFiles.push({ name: fileName, bytes });
        } else {
          downloadBlob(blob, fileName);
          // small delay between individual downloads so the browser doesn't block them
          await new Promise(r => setTimeout(r, 250));
        }
      }
      queueProgressFill.style.width = '100%';
      if (asZip) {
        queueProgressText.textContent = 'BUILDING ZIP...';
        await new Promise(r => setTimeout(r, 10));
        const zip = buildZip(zipFiles);
        downloadBlob(zip, 'yucca-fx-batch.zip');
        flash('ZIP DOWNLOADED (' + total + ' FILES)');
      } else {
        flash('EXPORTED ' + total + ' FILES');
      }
    } catch (e) {
      console.error(e);
      errorEl.textContent = '! Batch export failed: ' + (e.message || e);
      errorEl.style.display = '';
    }
    setTimeout(() => {
      queueProgress.style.display = 'none';
      queueProgressFill.style.width = '0%';
    }, 800);
    batchExporting = false;
    queueAddBtn.disabled = false; queueClearBtn.disabled = false;
    renderQueueList(); // re-enables batch buttons if queue still has items
  }

  renderQueueList();

  exportPopup.appendChild(exportSec.element);

  /* Init */
  loadPresets();
  loadQueue();
  if (state._queueRefresh) state._queueRefresh();
  renderPresetGrid();

  // Patch restoration priority: URL hash > localStorage autosave > default INIT
  let loaded = false;
  if (window.location.hash) {
    const p = hashToPatch(window.location.hash.slice(1));
    if (p) {
      // Use setPatch with skipHistory so the boot doesn't pollute the BACK stack
      setPatch(p, { skipHistory: true });
      flash('PATCH LOADED FROM URL');
      loaded = true;
    }
  }
  if (!loaded) {
    const saved = loadAutosave();
    if (saved && saved.patch) {
      setPatch(saved.patch, { skipHistory: true });
      if (saved.sequencer && typeof applySequencerSnapshot === 'function') {
        applySequencerSnapshot(saved.sequencer);
      }
      // No flash here — silently restoring is the expected behavior; loud
      // notifications about it would feel noisy on every page load
      loaded = true;
    }
  }

  refreshAll();
  // initial scope render
  setTimeout(renderScope, 100);
}

/* Hotkeys */
document.addEventListener('keydown', e => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.code === 'Space') { e.preventDefault(); playSound(); }
  else if (e.key === 'r' || e.key === 'R') {
    // Mirror the RANDOM button's confirm flow so the hotkey isn't a sneaky
    // bypass of the "are you sure" modal — uses the same suppression key,
    // so once the user opts out for the session it works as a one-tap shortcut
    showConfirm({
      title: '> RANDOMIZE PATCH?',
      message: 'This will replace your current patch with a new random sound. If you have not saved your current patch, it will be lost.',
      confirmLabel: 'RANDOMIZE', cancelLabel: 'KEEP IT', accent: C.magenta,
      dontShowAgainKey: 'random',
      dontShowAgainLabel: "DON'T SHOW AGAIN THIS SESSION",
      onConfirm: () => { setPatch(randomPatch()); flash('RANDOMIZED'); },
    });
  }
});

/* Boot */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', build);
} else {
  build();
}
</script>
</body>
</html>
